<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>TEAM.PRIME — Admin</title>
<link rel="stylesheet" href="/style.css">
<style>
/* 어드민 전용 스타일 */
body{background:#f2f2f2}
.admin-app{width:100%;max-width:430px;margin:0 auto;background:#fff;min-height:100vh;display:flex;flex-direction:column}
.admin-header{padding:16px;background:#000;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.admin-header .logo{color:#fff;font-size:17px;font-weight:700;letter-spacing:0.08em}
.admin-header .sub{color:#888;font-size:11px;margin-top:2px}
.badge-admin{font-size:10px;background:#fff;color:#000;padding:3px 10px;font-weight:700;letter-spacing:0.06em}

/* 로그인 */
#loginWrap{flex:1;display:flex;align-items:center;justify-content:center;padding:32px 24px}
.login-box h2{font-size:20px;font-weight:700;margin-bottom:24px}

/* 패널 */
#panel{display:none;flex-direction:column;flex:1}

/* 탭 */
.main-tabs{display:flex;border-bottom:2px solid #000;background:#fff;flex-shrink:0}
.main-tab{flex:1;padding:12px 4px;font-size:13px;text-align:center;cursor:pointer;background:#fff;border:none;color:#aaa;font-family:inherit;font-weight:600;border-bottom:3px solid transparent;margin-bottom:-2px}
.main-tab.on{color:#000;font-weight:800;border-bottom-color:#000}
.tab-bar{display:flex;border-bottom:1px solid #eee;background:#fff;flex-shrink:0}
.tab{flex:1;padding:11px 4px;font-size:12px;text-align:center;cursor:pointer;background:#fff;border:none;color:#aaa;font-family:inherit;font-weight:600;border-bottom:2px solid transparent;margin-bottom:-1px}
.tab.on{color:#000;font-weight:800;border-bottom-color:#000}

/* 섹션/패널 */
.section{display:none;flex-direction:column;flex:1;overflow-y:auto}
.section.on{display:flex}
.pane{display:none;padding:16px;flex:1;overflow-y:auto}
.pane.on{display:block}

/* 로그아웃 */
.logout-bar{padding:14px 16px;border-top:1px solid #eee;flex-shrink:0}

/* 에디터 */
.editor-toolbar{display:flex;flex-wrap:wrap;gap:3px;padding:8px;border:1px solid #000;border-bottom:none;background:#f5f5f5}
.etool{padding:5px 8px;font-size:12px;font-family:inherit;border:1px solid #ccc;background:#fff;cursor:pointer;color:#000;font-weight:600}
.etool:active{background:#000;color:#fff}
.etool-sep{width:1px;background:#ddd;margin:0 2px;align-self:stretch}
.etool-select{padding:4px 5px;font-size:11px;font-family:inherit;border:1px solid #ccc;background:#fff;cursor:pointer;height:28px}
.etool-color{position:relative;padding:5px 8px;font-weight:700;border:1px solid #ccc;background:#fff;cursor:pointer;font-size:12px}
.etool-color input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.editor-body{min-height:220px;border:1px solid #000;padding:12px;font-size:14px;line-height:1.8;color:#000;outline:none;background:#fff}
.editor-body:focus{outline:2px solid #000;outline-offset:-1px}
.editor-body h1{font-size:22px;font-weight:800;margin:14px 0 6px}
.editor-body h2{font-size:18px;font-weight:700;margin:12px 0 5px}
.editor-body ul,.editor-body ol{padding-left:20px;margin:6px 0}
.editor-body a{color:#000;text-decoration:underline}
.editor-body img{max-width:100%;margin:8px 0;display:block}
.editor-body blockquote{border-left:4px solid #000;padding:10px 14px;margin:10px 0;color:#555;background:#f9f9f9;font-style:italic}
.editor-body hr{border:none;border-top:2px solid #000;margin:14px 0}

/* 오버레이 */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.6);display:flex;align-items:center;justify-content:center;z-index:999;flex-direction:column;gap:12px}
.overlay p{color:#fff;font-size:15px}
.spinner{width:32px;height:32px;border:3px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* 수정 시트 */
.sheet-bg{position:fixed;inset:0;background:rgba(0,0,0,0.5);display:flex;align-items:flex-end;justify-content:center;z-index:500;opacity:0;pointer-events:none;transition:opacity 0.2s}
.sheet-bg.on{opacity:1;pointer-events:all}
.sheet{background:#fff;width:100%;max-width:430px;max-height:90vh;overflow-y:auto;padding:20px 16px 40px;border-top:2px solid #000;transform:translateY(100%);transition:transform 0.25s}
.sheet-bg.on .sheet{transform:translateY(0)}
.sheet-handle{width:36px;height:3px;background:#000;margin:0 auto 18px;border-radius:2px}
.sheet h3{font-size:15px;font-weight:700;margin-bottom:16px}
.visitor-box{background:#f5f5f5;padding:16px;margin-bottom:16px;text-align:center}
.visitor-box .num{font-size:36px;font-weight:800}
.visitor-box .lbl{font-size:12px;color:#888;margin-top:4px}
.acct-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid #eee}
.acct-row p{font-size:13px;font-weight:600}
</style>
</head>

function hash(s){let h=0;for(let i=0;i<s.length;i++){h=(Math.imul(31,h)+s.charCodeAt(i))|0;}return h.toString(36);}
const CREDS={mycresoft:hash('prime2024!'),supremecre:hash('supreme!'),morphstudio:hash('morph!'),geckox:hash('geckox!'),creming:hash('creming!')};

async function api(path,opts={}){
  const r=await fetch(SB+'/rest/v1/'+path,{headers:{'apikey':KEY,'Authorization':'Bearer '+KEY,'Content-Type':'application/json','Prefer':'return=representation',...(opts.headers||{})},...opts});
  if(!r.ok)throw new Error(await r.text());
  const t=await r.text();return t?JSON.parse(t):null;
}

async function r2up(file,name){
  const region='auto',svc='s3',host=R2E.replace('https://','');
  const now=new Date();
  const ad=now.toISOString().replace(/[:\-]|\.\d{3}/g,'').slice(0,15)+'Z';
  const ds=ad.slice(0,8);
  const url=R2E+'/'+R2B+'/'+name;
  const buf=await file.arrayBuffer();
  const ph=Array.from(new Uint8Array(await crypto.subtle.digest('SHA-256',buf))).map(b=>b.toString(16).padStart(2,'0')).join('');
  const ch='content-type:'+file.type+'\nhost:'+host+'\nx-amz-content-sha256:'+ph+'\nx-amz-date:'+ad+'\n';
  const sh='content-type;host;x-amz-content-sha256;x-amz-date';
  const cr='PUT\n/'+R2B+'/'+name+'\n\n'+ch+'\n'+sh+'\n'+ph;
  const cs=ds+'/'+region+'/'+svc+'/aws4_request';
  const s2s='AWS4-HMAC-SHA256\n'+ad+'\n'+cs+'\n'+Array.from(new Uint8Array(await crypto.subtle.digest('SHA-256',new TextEncoder().encode(cr)))).map(b=>b.toString(16).padStart(2,'0')).join('');
  async function hmac(k,d){const ck=await crypto.subtle.importKey('raw',typeof k==='string'?new TextEncoder().encode(k):k,{name:'HMAC',hash:'SHA-256'},false,['sign']);return crypto.subtle.sign('HMAC',ck,typeof d==='string'?new TextEncoder().encode(d):d);}
  const sk=await hmac(await hmac(await hmac(await hmac('AWS4'+R2S,ds),region),svc),'aws4_request');
  const sig=Array.from(new Uint8Array(await hmac(sk,s2s))).map(b=>b.toString(16).padStart(2,'0')).join('');
  const auth='AWS4-HMAC-SHA256 Credential='+R2K+'/'+cs+', SignedHeaders='+sh+', Signature='+sig;
  const res=await fetch(url,{method:'PUT',headers:{'Content-Type':file.type,'x-amz-date':ad,'x-amz-content-sha256':ph,'Authorization':auth},body:buf});
  if(!res.ok)throw new Error('R2 실패 '+res.status);
  return R2+'/'+name;
}

function doLogin(){
  const uid=document.getElementById('loginBreeder').value;
  const pw=document.getElementById('loginPw').value;
  const err=document.getElementById('loginErr');
  if(!uid){err.textContent='브리더를 선택해주세요';err.style.display='block';return;}
  if(!pw){err.textContent='비밀번호를 입력해주세요';err.style.display='block';return;}
  if(CREDS[uid]!==hash(pw)){err.textContent='비밀번호가 틀립니다';err.style.display='block';document.getElementById('loginPw').value='';return;}
  me=uid;err.style.display='none';document.getElementById('loginPw').value='';
  document.getElementById('loginWrap').style.display='none';
  document.getElementById('panel').style.display='flex';
  document.getElementById('headerBadge').style.display='block';
  document.getElementById('headerLabel').textContent=BREEDERS[uid];
  if(uid!==MASTER)document.getElementById('t-acct').style.display='none';
  buildMorphGrid('morphGrid','p');
  buildMorphGrid('hMorphGrid','h');
  loadAnimals();
}

function switchTab(sec,tab){
  const tabs={parents:['reg','list','acct'],hatchlings:['hreg','hlist'],posts:['preg','plist']};
  tabs[sec].forEach(t=>{
    document.getElementById('p-'+t).classList.toggle('on',t===tab);
    document.getElementById('t-'+t).classList.toggle('on',t===tab);

  if(tab==='list')renderAnimalList();

function buildMorphGrid(id,type){
  document.getElementById(id).innerHTML=MORPHS.map(m=>'<div class="morph-chip" onclick="pickMorph(\''+m+'\',this,\''+type+'\')">'+m+'</div>').join('');
}
function pickMorph(name,el,type){
  const id=type==='p'?'morphGrid':type==='h'?'hMorphGrid':'editMorphGrid';
  document.getElementById(id).querySelectorAll('.morph-chip').forEach(c=>c.classList.remove('selected'));
  if(type==='p'){if(selMorph===name){selMorph=null;return;}selMorph=name;}
  else if(type==='h'){if(hSelMorph===name){hSelMorph=null;return;}hSelMorph=name;}
  else{if(editMorph===name){editMorph=null;return;}editMorph=name;}
  el.classList.add('selected');
}

function onMotherChange(){
  const s=document.getElementById('hMother');
  const o=s.options[s.selectedIndex];
  document.getElementById('hBreederPrev').textContent=s.value&&o.dataset.label?o.dataset.label:'—';
  updateHatchCode();
}

function updateHatchCode(){
  const fs=document.getElementById('hFather');
  const ms=document.getElementById('hMother');
  const dv=document.getElementById('hDate').value;
  const cl=document.getElementById('hClutch').value;
  const fo=fs.options[fs.selectedIndex];
  const mo=ms.options[ms.selectedIndex];
  const bc=BCODES[mo?.dataset?.owner]||'?';
  const fc=fo?.dataset?.code||'?';
  const mc=mo?.dataset?.code||'?';
  let code='—';
  if(fs.value&&ms.value&&dv&&cl){
    const d=new Date(dv);
    const yr=String(d.getFullYear()).slice(-1);
    const mm=String(d.getMonth()+1).padStart(2,'0');
    const dd=String(d.getDate()).padStart(2,'0');
    code=bc+'-'+fc+mc+'-'+yr+'-'+mm+dd+'-'+cl;
  }
  document.getElementById('hCodePrev').textContent=code;
}

async function saveAnimal(){
  const name=document.getElementById('aName').value.trim();
  const code=document.getElementById('aCode').value.trim().toUpperCase();
  const gender=document.getElementById('aGender').value;
  const ok=document.getElementById('saveOk'),err=document.getElementById('saveErr');
  ok.style.display='none';err.style.display='none';
  if(!name||!code){err.textContent='이름과 코드를 입력해주세요';err.style.display='block';return;}
  showOverlay(true);
  try{
    const ts=Date.now();
    let u1=null,u2=null;
    if(pendingF[0])u1=await r2up(pendingF[0],me+'_'+ts+'_1.'+pendingF[0].name.split('.').pop());
    if(pendingF[1])u2=await r2up(pendingF[1],me+'_'+ts+'_2.'+pendingF[1].name.split('.').pop());
    const fid=document.getElementById('aFather').value||null;
    const mid=document.getElementById('aMother').value||null;
    await api('animals',{method:'POST',body:JSON.stringify({name,code,gender:gender||null,morph:selMorph||null,image_url:u1,image_url_2:u2,owner_id:me,owner_label:BREEDERS[me],father_id:fid,mother_id:mid})});
    ok.style.display='block';
    document.getElementById('aName').value='';document.getElementById('aCode').value='';document.getElementById('aGender').value='';
    document.querySelectorAll('#morphGrid .morph-chip').forEach(c=>c.classList.remove('selected'));
    selMorph=null;pendingF=[null,null];
    [0,1].forEach(i=>{document.getElementById('ph'+i).innerHTML='<div style="font-size:22px">📷</div><div class="upload-label">사진 '+(i+1)+'</div>';});
    setTimeout(()=>ok.style.display='none',2500);
    await loadAnimals();
  }catch(e){err.textContent='등록 실패: '+e.message;err.style.display='block';}
  finally{showOverlay(false);}
}

async function saveHatchling(){
  const fid=document.getElementById('hFather').value;
  const mid=document.getElementById('hMother').value;
  const dv=document.getElementById('hDate').value;
  const cl=document.getElementById('hClutch').value;
  const gender=document.getElementById('hGender').value;
  const code=document.getElementById('hCodePrev').textContent;
  const ok=document.getElementById('hsaveOk'),err=document.getElementById('hsaveErr');
  ok.style.display='none';err.style.display='none';
  if(!fid||!mid||!dv||!cl){err.textContent='모든 항목을 입력해주세요';err.style.display='block';return;}
  const father=animals.find(a=>a.id===fid);
  const mother=animals.find(a=>a.id===mid);
  showOverlay(true);
  try{
    await api('hatchlings',{method:'POST',body:JSON.stringify({
      code,father_id:fid,mother_id:mid,
      father_code:father?.code||null,mother_code:mother?.code||null,
      morph:hSelMorph||null,gender:gender||null,
      owner_id:mother?.owner_id||me,owner_label:mother?.owner_label||BREEDERS[me],
      hatch_date:dv,clutch_no:parseInt(cl)
    })});
    ok.style.display='block';
    ['hFather','hMother','hDate','hClutch','hGender'].forEach(id=>document.getElementById(id).value='');
    document.getElementById('hCodePrev').textContent='—';
    document.getElementById('hBreederPrev').textContent='—';
    document.querySelectorAll('#hMorphGrid .morph-chip').forEach(c=>c.classList.remove('selected'));
    hSelMorph=null;
    setTimeout(()=>ok.style.display='none',2500);
  }catch(e){err.textContent='등록 실패: '+e.message;err.style.display='block';}
  finally{showOverlay(false);}
}

function openEdit(id){
  const a=animals.find(x=>x.id===id);if(!a)return;
  editMorph=a.morph||null;editF=[null,null];editUrls=[a.image_url||null,a.image_url_2||null];
  document.getElementById('editId').value=id;
  document.getElementById('editName').value=a.name;
  document.getElementById('editCode').value=a.code||'';
  document.getElementById('editGender').value=a.gender||'';
  buildMorphGrid('editMorphGrid','e');
  if(a.morph)setTimeout(()=>document.querySelectorAll('#editMorphGrid .morph-chip').forEach(c=>{if(c.textContent===a.morph)c.classList.add('selected');}),50);
  setTimeout(()=>{
    if(a.father_id)document.getElementById('editFather').value=a.father_id;
    if(a.mother_id)document.getElementById('editMother').value=a.mother_id;
  },100);
  [0,1].forEach(i=>{
    const url=i===0?a.image_url:a.image_url_2;
    document.getElementById('eph'+i).innerHTML=url?'<img src="'+url+'" class="upload-preview"><div class="upload-label">사진 '+(i+1)+' (기존)</div>':'<div style="font-size:22px">📷</div><div class="upload-label">사진 '+(i+1)+'</div>';
  });
  document.getElementById('editModal').classList.add('on');
}
function closeEdit(){document.getElementById('editModal').classList.remove('on');}

async function submitEdit(){
  const id=document.getElementById('editId').value;
  const name=document.getElementById('editName').value.trim();
  const code=document.getElementById('editCode').value.trim().toUpperCase();
  const gender=document.getElementById('editGender').value;

  if(!name){err.textContent='이름을 입력해주세요';err.style.display='block';return;}
  showOverlay(true);
  try{
    const ts=Date.now();

    if(editF[0])u1=await r2up(editF[0],me+'_'+ts+'_1.'+editF[0].name.split('.').pop());
    if(editF[1])u2=await r2up(editF[1],me+'_'+ts+'_2.'+editF[1].name.split('.').pop());

async function renderPostList(){
  const el=document.getElementById('postAdminList');
  try{
    const q=me===MASTER?'posts?select=id,title,category,author_label,created_at&order=created_at.desc':'posts?select=id,title,category,author_label,created_at&author_id=eq.'+me+'&order=created_at.desc';
    const posts=await api(q);
    if(!posts||!posts.length){el.innerHTML='<p style="font-size:13px;color:#bbb;padding:12px 0">등록된 게시글이 없습니다</p>';return;}
    el.innerHTML=posts.map(p=>'<div class="list-item"><div class="list-item-info" style="min-width:0"><p style="white-space:normal">'+p.title+'</p><span>'+(p.category||'')+'</span></div><button class="btn-danger" onclick="delPost(\''+p.id+'\')">삭제</button></div>').join('');
  }catch(e){el.innerHTML='<p style="color:#e00;font-size:13px">오류</p>';}
}
async function delPost(id){if(!confirm('삭제?'))return;try{await api('posts?id=eq.'+id,{method:'DELETE'});renderPostList();}catch(e){}}

async function openEditPost(id){
  try{
    const posts=await api('posts?id=eq.'+id+'&select=*');
    if(!posts||!posts.length)return;
    const p=posts[0];
    document.getElementById('editPostId').value=id;
    document.getElementById('editPostTitle').value=p.title||'';
    document.getElementById('editPostCat').value=p.category||'';
    document.getElementById('editPostEditor').innerHTML=p.content||'';
    document.getElementById('editPostModal').classList.add('on');
  }catch(e){alert('불러오기 실패');}
}
function closeEditPost(){document.getElementById('editPostModal').classList.remove('on');}

function pfmt(cmd){document.execCommand(cmd,false,null);document.getElementById('editPostEditor').focus();}
function pfmtBlock(tag){document.execCommand('formatBlock',false,tag);document.getElementById('editPostEditor').focus();}
function pfontSize(v){if(v)document.execCommand('fontSize',false,v);document.getElementById('editPostEditor').focus();}
function pcolor(v){document.execCommand('foreColor',false,v);document.getElementById('editPostEditor').focus();}
function pquote(){const sel=window.getSelection();const txt=sel&&sel.toString()?sel.toString():'인용구';document.execCommand('insertHTML',false,'<blockquote>'+txt+'</blockquote><p><br></p>');document.getElementById('editPostEditor').focus();}
function phr(){document.execCommand('insertHTML',false,'<hr><p><br></p>');document.getElementById('editPostEditor').focus();}
function plink(){const url=prompt('링크 URL:');if(url)document.execCommand('createLink',false,url);document.getElementById('editPostEditor').focus();}

async function submitEditPost(){
  const id=document.getElementById('editPostId').value;
  const title=document.getElementById('editPostTitle').value.trim();
  const html=document.getElementById('editPostEditor').innerHTML.trim();
  const cat=document.getElementById('editPostCat').value;
  const ok=document.getElementById('editPostOk'),err=document.getElementById('editPostErr');
  ok.style.display='none';err.style.display='none';
  if(!title||!html){err.textContent='제목과 내용을 입력해주세요';err.style.display='block';return;}
  try{
    await api('posts?id=eq.'+id,{method:'PATCH',body:JSON.stringify({title,content:html,category:cat||null})});
    ok.style.display='block';
    setTimeout(()=>{ok.style.display='none';closeEditPost();renderPostList();},1500);
  }catch(e){err.textContent='수정 실패: '+e.message;err.style.display='block';}
}
</script>
