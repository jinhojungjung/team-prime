<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>TEAM.PRIME — Admin</title>
<link rel="stylesheet" href="/style.css">
</head>
<body>
<div class="app">
  <div class="header admin-header">
    <div><div class="logo tp-logo">🦎 TEAM.PRIME</div><div class="sub tp-sub">관리자 패널</div></div>
    <div id="headerBadge" style="display:none"><span class="badge-admin" id="headerLabel"></span></div>
  </div>

  <div class="login-wrap" id="loginWrap">
    <div class="login-box">
      <h2>어드민 로그인</h2>
      <div id="loginErr" class="msg-err" style="display:none"></div>
      <div class="field">
        <label>브리더 선택</label>
        <select id="loginBreeder">
          <option value="">선택해주세요</option>
          <option value="mycresoft">마이크레소프트</option>
          <option value="supremecre">슈프림크레</option>
          <option value="morphstudio">모프스튜디오</option>
          <option value="geckox">게코엑스</option>
          <option value="creming">크레밍</option>
        </select>
      </div>
      <div class="field">
        <label>비밀번호</label>
        <input type="password" id="loginPw" placeholder="비밀번호" autocomplete="off" onkeydown="if(event.key==='Enter')doLogin()">
      </div>
      <button class="btn btn-primary" onclick="doLogin()">로그인</button>
    </div>
  </div>

  <div class="panel" id="panel">
    <div class="main-tabs">
      <button class="main-tab active" id="amtab-parents" onclick="switchAdminMain('parents')">🦎 부모</button>
      <button class="main-tab" id="amtab-hatchlings" onclick="switchAdminMain('hatchlings')">🥚 해칭</button>
      <button class="main-tab" id="amtab-posts" onclick="switchAdminMain('posts')">📖 가이드</button>
    </div>

    <div id="asection-parents">
      <div class="tab-bar">
        <button class="tab active" id="tab-reg-btn" onclick="switchTab('reg')">등록</button>
        <button class="tab" id="tab-list-btn" onclick="switchTab('list')">목록</button>
        <button class="tab" id="tab-acct-btn" onclick="switchTab('acct')">계정 관리</button>
      </div>
      <div class="pane show" id="pane-reg">
        <div id="saveOk" class="msg-ok" style="display:none">✓ 등록 완료</div>
        <div id="saveErr" class="msg-err" style="display:none"></div>
        <div class="field"><label>개체 이름 *</label><input type="text" id="aName" placeholder="이름 입력" autocomplete="off"></div>
        <div class="field">
          <label>개체 코드 * (브리더 내 고유값)</label>
          <input type="text" id="aCode" placeholder="예: M (마블), S (사나)" autocomplete="off" oninput="this.value=this.value.toUpperCase()">
          <div class="code-hint">브리더 코드 + 개체 코드로 해칭 코드가 생성됩니다</div>
        </div>
        <div class="field">
          <label>성별</label>
          <select id="aGender">
            <option value="">선택 안 함</option>
            <option value="수컷">수컷</option>
            <option value="암컷">암컷</option>
            <option value="미확인">미확인</option>
          </select>
        </div>
        <div class="field"><label>모프</label><div class="morph-grid" id="morphGrid"></div></div>
        <div class="field">
          <label>사진 (최대 2장)</label>
          <div class="upload-row">
            <div class="upload-box"><input type="file" accept="image/*" onchange="handleImg(event,0)"><div id="uploadPh0"><div style="font-size:22px">📷</div><div class="upload-label">사진 1</div></div></div>
            <div class="upload-box"><input type="file" accept="image/*" onchange="handleImg(event,1)"><div id="uploadPh1"><div style="font-size:22px">📷</div><div class="upload-label">사진 2</div></div></div>
          </div>
        </div>
        <button class="btn btn-primary" onclick="saveAnimal()">등록하기</button>
      </div>
      <div class="pane" id="pane-list"><div id="adminList"></div></div>
      <div class="pane" id="pane-acct">
        <div id="acctOk" class="msg-ok" style="display:none"></div>
        <div id="acctPanel"></div>
      </div>
    </div>

    <div id="asection-hatchlings" style="display:none">
      <div class="tab-bar">
        <button class="tab active" id="tab-hreg-btn" onclick="switchHTab('hreg')">등록</button>
        <button class="tab" id="tab-hlist-btn" onclick="switchHTab('hlist')">목록</button>
      </div>
      <div class="pane show" id="pane-hreg">
        <div id="hsaveOk" class="msg-ok" style="display:none">✓ 등록 완료</div>
        <div id="hsaveErr" class="msg-err" style="display:none"></div>
        <div class="field"><label>부 (전체 브리더 수컷)</label><select id="hFather" onchange="updateHatchCode()"><option value="">선택</option></select></div>
        <div class="field"><label>모 (전체 브리더 암컷) — 해칭 브리더 결정</label><select id="hMother" onchange="onMotherChange()"><option value="">선택</option></select></div>
        <div class="field">
          <label>해칭 브리더 (모 기준 자동)</label>
          <div class="code-preview" id="hBreederPreview" style="font-size:13px;letter-spacing:0">—</div>
        </div>
        <div class="field"><label>해칭일</label><input type="date" id="hDate" oninput="updateHatchCode()"></div>
        <div class="field"><label>클러치 번호</label><input type="number" id="hClutch" placeholder="예: 1" min="1" oninput="updateHatchCode()"></div>
        <div class="field"><label>자동 생성 코드</label><div class="code-preview" id="hCodePreview">—</div></div>
        <div class="field">
          <label>성별</label>
          <select id="hGender">
            <option value="">선택 안 함</option>
            <option value="수컷">수컷</option>
            <option value="암컷">암컷</option>
            <option value="미확인">미확인</option>
          </select>
        </div>
        <div class="field"><label>모프</label><div class="morph-grid" id="hMorphGrid"></div></div>
