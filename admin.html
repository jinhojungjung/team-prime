<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0a0b0c">
<title>TEAM.PRIME — Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800;900&family=Archivo+Expanded:wght@600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<link rel="stylesheet" href="/style.css?v=2">
<style>
/* 어드민 전용 스타일 (다크) */
body{background:#0a0b0c}
.admin-app{width:100%;max-width:430px;margin:0 auto;background:var(--bg);min-height:100vh;display:flex;flex-direction:column;border-left:1px solid var(--line);border-right:1px solid var(--line)}
.admin-header{padding:16px;background:#0a0b0c;border-bottom:1px solid var(--line2);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.admin-header .logo{color:var(--ink);font-family:var(--exp);font-size:16px;font-weight:800;letter-spacing:-0.01em}
.admin-header .sub{color:var(--mute);font-family:var(--mono);font-size:10px;margin-top:3px;letter-spacing:0.06em}
.badge-admin{font-size:10px;background:var(--ac);color:#0c1410;padding:3px 10px;font-weight:700;letter-spacing:0.06em}

/* 로그인 */
#loginWrap{flex:1;display:flex;align-items:center;justify-content:center;padding:32px 24px}
.login-box h2{font-family:var(--dpl);font-size:20px;font-weight:800;margin-bottom:24px;color:var(--ink)}

/* 패널 */
#panel{display:none;flex-direction:column;flex:1}

/* 탭 */
.main-tabs{display:flex;border-bottom:2px solid var(--line2);background:transparent;flex-shrink:0}
.main-tab{flex:1;padding:12px 4px;font-size:13px;text-align:center;cursor:pointer;background:none;border:none;color:var(--mute);font-family:inherit;font-weight:600;border-bottom:3px solid transparent;margin-bottom:-2px}
.main-tab.on{color:var(--ac);font-weight:800;border-bottom-color:var(--ac)}
.tab-bar{display:flex;border-bottom:1px solid var(--line);background:transparent;flex-shrink:0}
.tab{flex:1;padding:11px 4px;font-size:12px;text-align:center;cursor:pointer;background:none;border:none;color:var(--mute);font-family:inherit;font-weight:600;border-bottom:2px solid transparent;margin-bottom:-1px}
.tab.on{color:var(--ink);font-weight:800;border-bottom-color:var(--ink)}

/* 섹션/패널 */
.section{display:none;flex-direction:column;flex:1;overflow-y:auto}
.section.on{display:flex}
.pane{display:none;padding:16px;flex:1;overflow-y:auto}
.pane.on{display:block}

/* 로그아웃 */
.logout-bar{padding:14px 16px;border-top:1px solid var(--line);flex-shrink:0}

/* 에디터 */
.editor-toolbar{display:flex;flex-wrap:wrap;gap:3px;padding:8px;border:1px solid var(--line2);border-bottom:none;background:var(--surface2)}
.etool{padding:5px 8px;font-size:12px;font-family:inherit;border:1px solid var(--line2);background:var(--surface);cursor:pointer;color:var(--ink);font-weight:600}
.etool:active{background:var(--ac);color:#0c1410}
.etool-sep{width:1px;background:var(--line2);margin:0 2px;align-self:stretch}
.etool-select{padding:4px 5px;font-size:11px;font-family:inherit;border:1px solid var(--line2);background:var(--surface);color:var(--ink);cursor:pointer;height:28px}
.etool-color{position:relative;padding:5px 8px;font-weight:700;border:1px solid var(--line2);background:var(--surface);color:var(--ink);cursor:pointer;font-size:12px}
.etool-color input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.editor-body{min-height:220px;border:1px solid var(--line2);padding:12px;font-size:14px;line-height:1.8;color:var(--ink);outline:none;background:var(--surface)}
.editor-body:focus{outline:2px solid var(--ac);outline-offset:-1px}
.editor-body h1{font-size:22px;font-weight:800;margin:14px 0 6px}
.editor-body h2{font-size:18px;font-weight:700;margin:12px 0 5px}
.editor-body ul,.editor-body ol{padding-left:20px;margin:6px 0}
.editor-body a{color:var(--ac);text-decoration:underline}
.editor-body img{max-width:100%;margin:8px 0;display:block}
.editor-body blockquote{border-left:4px solid var(--ac);padding:10px 14px;margin:10px 0;color:#cfd3d8;background:var(--surface2);font-style:italic}
.editor-body hr{border:none;border-top:2px solid var(--line2);margin:14px 0}

/* 오버레이 */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);display:flex;align-items:center;justify-content:center;z-index:999;flex-direction:column;gap:12px}
.overlay p{color:var(--ink);font-size:15px}
.spinner{width:32px;height:32px;border:3px solid rgba(255,255,255,0.25);border-top-color:var(--ac);border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* 수정 시트 */
.sheet-bg{position:fixed;inset:0;background:rgba(0,0,0,0.6);display:flex;align-items:flex-end;justify-content:center;z-index:500;opacity:0;pointer-events:none;transition:opacity 0.2s}
.sheet-bg.on{opacity:1;pointer-events:all}
.sheet{background:var(--surface);width:100%;max-width:430px;max-height:90vh;overflow-y:auto;padding:20px 16px 40px;border-top:2px solid var(--line2);transform:translateY(100%);transition:transform 0.25s}
.sheet-bg.on .sheet{transform:translateY(0)}
.sheet-handle{width:36px;height:3px;background:var(--line2);margin:0 auto 18px;border-radius:2px}
.sheet h3{font-family:var(--dpl);font-size:15px;font-weight:800;margin-bottom:16px;color:var(--ink)}
.visitor-box{background:var(--surface);border:1px solid var(--line);padding:16px;margin-bottom:16px;text-align:center}
.visitor-box .num{font-family:var(--mono);font-size:34px;font-weight:700;color:var(--ac)}
.visitor-box .lbl{font-size:12px;color:var(--mute);margin-top:4px}
.acct-row{display:flex;align-items:center;justify-content:space-between;padding:11px 0;border-bottom:1px solid var(--line)}
.acct-row p{font-size:13px;font-weight:600;color:var(--ink)}
</style>
</head>
<body>
<div class="admin-app">
  <!-- 헤더 -->
  <div class="admin-header">
    <div><div class="logo">🦎 TEAM.PRIME</div><div class="sub">관리자 패널</div></div>
    <div id="headerBadge" style="display:none"><span class="badge-admin" id="headerLabel"></span></div>
  </div>

  <!-- 로그인 -->
  <div id="loginWrap">
    <div class="login-box" style="width:100%">
      <h2>어드민 로그인</h2>
      <div id="loginErr" class="msg-err" style="display:none"></div>
      <div class="field">
        <label>브리더 선택</label>
        <select id="loginBreeder">
          <option value="">선택해주세요</option>
          <option value="mycresoft">마이크레소프트</option>
          <option value="supremecre">슈프림크레</option>
          <option value="morphstudio">모프스튜디오</option>
          <option value="geckox">게코엑스</option>
          <option value="creming">크레밍</option>
        </select>
      </div>
      <div class="field">
        <label>비밀번호</label>
        <input type="password" id="loginPw" placeholder="비밀번호" autocomplete="off" onkeydown="if(event.key==='Enter')doLogin()">
      </div>
      <button class="btn btn-primary" onclick="doLogin()">로그인</button>
      <p style="text-align:center;margin-top:14px"><a href="#" onclick="forgotPw();return false" style="font-size:12px;color:#888">비밀번호를 잊으셨나요?</a></p>
    </div>
  </div>

  <!-- 패널 (로그인 후) -->
  <div id="panel">
    <!-- 메인 탭 -->
    <div class="main-tabs">
      <button class="main-tab on" id="mt-parents" onclick="switchMain('parents')">🦎 부모</button>
      <button class="main-tab" id="mt-hatchlings" onclick="switchMain('hatchlings')">🥚 해칭</button>
      <button class="main-tab" id="mt-posts" onclick="switchMain('posts')">📖 가이드</button>
    </div>

    <!-- 부모 섹션 -->
    <div class="section on" id="sec-parents">
      <div class="tab-bar">
        <button class="tab on" id="t-reg" onclick="switchTab('parents','reg')">등록</button>
        <button class="tab" id="t-list" onclick="switchTab('parents','list')">목록</button>
        <button class="tab" id="t-acct" onclick="switchTab('parents','acct')">계정 관리</button>
      </div>
      <div class="pane on" id="p-reg">
        <div id="saveOk" class="msg-ok" style="display:none">✓ 등록 완료</div>
        <div id="saveErr" class="msg-err" style="display:none"></div>
        <div class="field"><label>개체 이름 *</label><input type="text" id="aName" placeholder="이름 입력" autocomplete="off"></div>
        <div class="field">
          <label>개체 코드 *</label>
          <input type="text" id="aCode" placeholder="예: M (마블), S (사나)" oninput="this.value=this.value.toUpperCase()">
          <div class="code-hint">브리더 코드 + 개체 코드로 해칭 코드 생성</div>
        </div>
        <div class="field">
          <label>성별</label>
          <select id="aGender"><option value="">선택 안 함</option><option value="수컷">수컷</option><option value="암컷">암컷</option><option value="미구분">미구분</option></select>
        </div>
        <div class="field"><label>부 (선택)</label><select id="aFather"><option value="">선택 안 함</option></select></div>
        <div class="field"><label>모 (선택)</label><select id="aMother"><option value="">선택 안 함</option></select></div>
        <div class="field"><label>모프</label><div class="morph-grid" id="morphGrid"></div></div>
        <div class="field">
          <label>사진 (최대 2장)</label>
          <div class="upload-row">
            <div class="upload-box"><input type="file" accept="image/*" onchange="handleImg(event,0)"><div id="ph0"><div style="font-size:22px">📷</div><div class="upload-label">사진 1</div></div></div>
            <div class="upload-box"><input type="file" accept="image/*" onchange="handleImg(event,1)"><div id="ph1"><div style="font-size:22px">📷</div><div class="upload-label">사진 2</div></div></div>
          </div>
        </div>
        <button class="btn btn-primary" onclick="saveAnimal()">등록하기</button>
      </div>
      <div class="pane" id="p-list"><div id="adminList"></div></div>
      <div class="pane" id="p-acct"><div id="acctOk" class="msg-ok" style="display:none"></div><div id="acctPanel"></div></div>
    </div>

    <!-- 해칭 섹션 -->
    <div class="section" id="sec-hatchlings">
      <div class="tab-bar">
        <button class="tab on" id="t-hreg" onclick="switchTab('hatchlings','hreg')">등록</button>
        <button class="tab" id="t-hlist" onclick="switchTab('hatchlings','hlist')">목록</button>
      </div>
      <div class="pane on" id="p-hreg">
        <div id="hsaveOk" class="msg-ok" style="display:none">✓ 등록 완료</div>
        <div id="hsaveErr" class="msg-err" style="display:none"></div>
        <div class="field"><label>부 (수컷)</label><select id="hFather" onchange="updateHatchCode()"><option value="">선택</option></select></div>
        <div class="field"><label>모 (암컷) — 해칭 브리더 결정</label><select id="hMother" onchange="onMotherChange()"><option value="">선택</option></select></div>
        <div class="field"><label>해칭 브리더 (모 기준)</label><div class="code-preview" id="hBreederPrev" style="font-size:13px;letter-spacing:0">—</div></div>
        <div class="field"><label>해칭일</label><input type="date" id="hDate" oninput="updateHatchCode()"></div>
        <div class="field"><label>클러치 번호</label><input type="number" id="hClutch" placeholder="예: 1" min="1" oninput="updateHatchCode()"></div>
        <div class="field"><label>자동 생성 코드</label><div class="code-preview" id="hCodePrev">—</div></div>
        <div class="field">
          <label>성별</label>
          <select id="hGender"><option value="">선택 안 함</option><option value="수컷">수컷</option><option value="암컷">암컷</option><option value="미구분">미구분</option></select>
        </div>
        <div class="field"><label>모프</label><div class="morph-grid" id="hMorphGrid"></div></div>
        <button class="btn btn-primary" onclick="saveHatchling()">등록하기</button>
      </div>
      <div class="pane" id="p-hlist"><div id="hAdminList"></div></div>
    </div>

    <!-- 가이드 섹션 -->
    <div class="section" id="sec-posts">
      <div class="tab-bar">
        <button class="tab on" id="t-preg" onclick="switchTab('posts','preg')">등록</button>
        <button class="tab" id="t-plist" onclick="switchTab('posts','plist')">목록</button>
      </div>
      <div class="pane on" id="p-preg">
        <div id="psaveOk" class="msg-ok" style="display:none">✓ 등록 완료</div>
        <div id="psaveErr" class="msg-err" style="display:none"></div>
        <div class="field">
          <label>카테고리</label>
          <select id="pCategory">
            <option value="">선택 안 함</option>
            <option value="공지">공지</option>
            <option value="정보">정보</option>
            <option value="알관리">알관리</option>
            <option value="해칭">해칭</option>
            <option value="사육환경">사육환경</option>
            <option value="먹이">먹이</option>
            <option value="건강">건강</option>
            <option value="기타">기타</option>
          </select>
        </div>
        <div class="field"><label>제목 *</label><input type="text" id="pTitle" placeholder="제목 입력" autocomplete="off"></div>
        <div class="field">
          <label>내용 *</label>
          <div class="editor-toolbar">
            <button class="etool" onclick="fmt('bold')"><b>B</b></button>
            <button class="etool" onclick="fmt('italic')"><i>I</i></button>
            <button class="etool" onclick="fmt('underline')"><u>U</u></button>
            <button class="etool" onclick="fmt('strikeThrough')"><s>S</s></button>
            <span class="etool-sep"></span>
            <button class="etool" onclick="fmtBlock('h1')">H1</button>
            <button class="etool" onclick="fmtBlock('h2')">H2</button>
            <button class="etool" onclick="fmtBlock('p')">P</button>
            <span class="etool-sep"></span>
            <select class="etool-select" onchange="setFontSize(this.value)">
              <option value="">크기</option>
              <option value="1">작게</option>
              <option value="3">보통</option>
              <option value="5">크게</option>
              <option value="7">아주크게</option>
            </select>
            <label class="etool etool-color">A<input type="color" value="#000000" onchange="setColor(this.value)"></label>
            <span class="etool-sep"></span>
            <button class="etool" onclick="fmt('justifyLeft')">◀</button>
            <button class="etool" onclick="fmt('justifyCenter')">▶◀</button>
            <button class="etool" onclick="fmt('justifyRight')">▶</button>
            <span class="etool-sep"></span>
            <button class="etool" onclick="fmt('insertUnorderedList')">•—</button>
            <button class="etool" onclick="fmt('insertOrderedList')">1—</button>
            <span class="etool-sep"></span>
            <button class="etool" onclick="insertQuote()">❝</button>
            <button class="etool" onclick="insertHr()">—</button>
            <button class="etool" onclick="insertLink()">🔗</button>
            <button class="etool" onclick="insertImg()">🖼</button>
          </div>
          <div id="pEditor" class="editor-body" contenteditable="true" spellcheck="false"></div>
        </div>
        <button class="btn btn-primary" style="margin-top:4px" onclick="savePost()">등록하기</button>
        <input type="file" id="editorImgInput" accept="image/*" style="display:none" onchange="handleEditorImg(event)">
      </div>
      <div class="pane" id="p-plist"><div id="postAdminList"></div></div>
    </div>

    <div class="logout-bar"><button class="btn btn-ghost" onclick="doLogout()">로그아웃</button></div>
  </div>
</div>

<!-- 게시글 수정 시트 -->
<div class="sheet-bg" id="editPostModal" onclick="if(event.target===this)closeEditPost()">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <h3>게시글 수정</h3>
    <div id="editPostOk" class="msg-ok" style="display:none">✓ 수정 완료</div>
    <div id="editPostErr" class="msg-err" style="display:none"></div>
    <input type="hidden" id="editPostId">
    <div class="field">
      <label>카테고리</label>
      <select id="editPostCat">
        <option value="">선택 안 함</option>
        <option value="공지">공지</option>
        <option value="정보">정보</option>
        <option value="알관리">알관리</option>
        <option value="해칭">해칭</option>
        <option value="사육환경">사육환경</option>
        <option value="먹이">먹이</option>
        <option value="건강">건강</option>
        <option value="기타">기타</option>
      </select>
    </div>
    <div class="field"><label>제목 *</label><input type="text" id="editPostTitle"></div>
    <div class="field">
      <label>내용 *</label>
      <div class="editor-toolbar">
        <button class="etool" onclick="pfmt('bold')"><b>B</b></button>
        <button class="etool" onclick="pfmt('italic')"><i>I</i></button>
        <button class="etool" onclick="pfmt('underline')"><u>U</u></button>
        <button class="etool" onclick="pfmt('strikeThrough')"><s>S</s></button>
        <span class="etool-sep"></span>
        <button class="etool" onclick="pfmtBlock('h1')">H1</button>
        <button class="etool" onclick="pfmtBlock('h2')">H2</button>
        <button class="etool" onclick="pfmtBlock('p')">P</button>
        <span class="etool-sep"></span>
        <select class="etool-select" onchange="pfontSize(this.value)">
          <option value="">크기</option>
          <option value="1">작게</option>
          <option value="3">보통</option>
          <option value="5">크게</option>
          <option value="7">아주크게</option>
        </select>
        <label class="etool etool-color">A<input type="color" value="#000000" onchange="pcolor(this.value)"></label>
        <span class="etool-sep"></span>
        <button class="etool" onclick="pfmt('justifyLeft')">◀</button>
        <button class="etool" onclick="pfmt('justifyCenter')">▶◀</button>
        <button class="etool" onclick="pfmt('justifyRight')">▶</button>
        <span class="etool-sep"></span>
        <button class="etool" onclick="pfmt('insertUnorderedList')">•—</button>
        <button class="etool" onclick="pfmt('insertOrderedList')">1—</button>
        <span class="etool-sep"></span>
        <button class="etool" onclick="pquote()">❝</button>
        <button class="etool" onclick="phr()">—</button>
        <button class="etool" onclick="plink()">🔗</button>
      </div>
      <div id="editPostEditor" class="editor-body" contenteditable="true" spellcheck="false"></div>
    </div>
    <div style="display:flex;gap:8px;margin-top:8px">
      <button class="btn btn-ghost" style="flex:1" onclick="closeEditPost()">취소</button>
      <button class="btn btn-primary" style="flex:1" onclick="submitEditPost()">저장</button>
    </div>
  </div>
</div>

<!-- 수정 시트 -->
<div class="sheet-bg" id="editModal" onclick="if(event.target===this)closeEdit()">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <h3>부모 개체 수정</h3>
    <div id="editOk" class="msg-ok" style="display:none">✓ 수정 완료</div>
    <div id="editErr" class="msg-err" style="display:none"></div>
    <input type="hidden" id="editId">
    <div class="field"><label>개체 이름 *</label><input type="text" id="editName"></div>
    <div class="field"><label>개체 코드</label><input type="text" id="editCode" oninput="this.value=this.value.toUpperCase()"></div>
    <div class="field">
      <label>성별</label>
      <select id="editGender"><option value="">선택 안 함</option><option value="수컷">수컷</option><option value="암컷">암컷</option><option value="미구분">미구분</option></select>
    </div>
    <div class="field"><label>부 (선택)</label><select id="editFather"><option value="">선택 안 함</option></select></div>
    <div class="field"><label>모 (선택)</label><select id="editMother"><option value="">선택 안 함</option></select></div>
    <div class="field"><label>모프</label><div class="morph-grid" id="editMorphGrid"></div></div>
    <div class="field">
      <label>사진 교체</label>
      <div class="upload-row">

const BUCKET='animal-images';
// 표시 크기에 맞게 이미지 리사이즈 (Supabase=네이티브 변환, R2 등=weserv 무료 CDN)
function rs(url,w){
  if(!url) return url;
  if(url.indexOf('/storage/v1/object/public/')>=0)
    return url.replace('/object/public/','/render/image/public/')+(url.indexOf('?')<0?'?':'&')+'width='+w+'&resize=contain&quality=70';
  return 'https://images.weserv.nl/?url='+encodeURIComponent(url.replace(/^https?:\/\//,''))+'&w='+w+'&q=70&output=webp';
}
// 업로드 전 캔버스로 리사이즈+압축 (최대 maxW px, JPEG 0.82) — 폰 사진 1MB+ → ~150KB
async function compress(file,maxW){
  if(!file.type||file.type.indexOf('image/')!==0) return file;
  let bmp;
  try{ bmp=await createImageBitmap(file,{imageOrientation:'from-image'}); }
  catch(e){ try{ bmp=await createImageBitmap(file); }catch(_){ return file; } }
  const scale=Math.min(1,maxW/bmp.width);
  const w=Math.round(bmp.width*scale),h=Math.round(bmp.height*scale);
  const c=document.createElement('canvas');c.width=w;c.height=h;
  c.getContext('2d').drawImage(bmp,0,0,w,h);
  if(bmp.close)bmp.close();
  return await new Promise(res=>c.toBlob(b=>res(b||file),'image/jpeg',0.82));
}
// Supabase Storage 업로드 (anon 키 — 시크릿 불필요, 삭제는 정책상 차단됨)
async function sbup(file,name){
  const blob=await compress(file,1280);
  const tok=await authToken();
  const r=await fetch(SB+'/storage/v1/object/'+BUCKET+'/'+name,{method:'POST',headers:{'apikey':KEY,'Authorization':'Bearer '+tok,'Content-Type':'image/jpeg','x-upsert':'true'},body:blob});
  if(!r.ok) throw new Error('업로드 실패 '+r.status);
  return SB+'/storage/v1/object/public/'+BUCKET+'/'+name;
}

// ── Supabase Auth 세션 관리 ──────────────────────────────
function setSession(d){
  SESSION={access_token:d.access_token,refresh_token:d.refresh_token,expires_at:Date.now()+((d.expires_in||3600)*1000),user:d.user};
  try{localStorage.setItem('tp_session',JSON.stringify(SESSION));}catch(e){}
}
function clearSession(){SESSION=null;isMaster=false;try{localStorage.removeItem('tp_session');}catch(e){}}
async function refreshSession(){
  if(!SESSION||!SESSION.refresh_token){clearSession();return;}
  try{
    const r=await fetch(SB+'/auth/v1/token?grant_type=refresh_token',{method:'POST',headers:{'apikey':KEY,'Content-Type':'application/json'},body:JSON.stringify({refresh_token:SESSION.refresh_token})});
    if(!r.ok)throw 0;
    setSession(await r.json());
  }catch(e){clearSession();}
}
// 만료 임박 시 자동 갱신 후 현재 접근 토큰 반환 (비로그인 시 anon 키)
async function authToken(){
  if(!SESSION) return KEY;
  if(SESSION.expires_at && Date.now()>SESSION.expires_at-60000){ await refreshSession(); }
  return SESSION?SESSION.access_token:KEY;
}

async function api(path,opts={}){
  const tok=await authToken();
  const r=await fetch(SB+'/rest/v1/'+path,{headers:{'apikey':KEY,'Authorization':'Bearer '+tok,'Content-Type':'application/json','Prefer':'return=representation',...(opts.headers||{})},...opts});
  if(r.status===401&&SESSION){doLogout();throw new Error('세션이 만료되었습니다. 다시 로그인해주세요.');}
  if(!r.ok)throw new Error(await r.text());
  const t=await r.text();return t?JSON.parse(t):null;
}

// 🖼 클릭 시점의 에디터 캐럿을 저장해 둔다(파일창/업로드 동안 선택영역이 사라지므로).
var pImgRange=null;
function insertImg(){
  const ed=document.getElementById('pEditor'),sel=window.getSelection();
  pImgRange=(sel&&sel.rangeCount&&ed.contains(sel.getRangeAt(0).commonAncestorContainer))?sel.getRangeAt(0).cloneRange():null;
  document.getElementById('editorImgInput').click();
}
async function handleEditorImg(e){
  const f=e.target.files[0];if(!f)return;
  showOverlay(true);
  try{
    const url=await sbup(f,'post_'+me+'_'+Date.now()+'_'+Math.random().toString(36).slice(2,7)+'.jpg');
    const ed=document.getElementById('pEditor');
    const img=document.createElement('img');img.src=url;
    const p=document.createElement('p');p.innerHTML='<br>';
    // 저장해 둔 캐럿이 에디터 안이면 그 자리에, 아니면 에디터 끝에 삽입한다(execCommand 미사용 → 포커스와 무관).
    let rng=pImgRange;
    if(!rng||!ed.contains(rng.commonAncestorContainer)){rng=document.createRange();rng.selectNodeContents(ed);}
    rng.collapse(false);
    const frag=document.createDocumentFragment();frag.appendChild(img);frag.appendChild(p);
    rng.insertNode(frag);
    const nr=document.createRange();nr.setStartAfter(p);nr.collapse(true);
    const sel=window.getSelection();sel.removeAllRanges();sel.addRange(nr);
    pImgRange=nr.cloneRange();
  }
  catch(err){alert('이미지 업로드 실패');}
  finally{showOverlay(false);e.target.value='';}
}

// 본문에 박힌 base64 이미지(<img src="data:...">)를 Storage에 업로드하고 URL로 치환한다.
// 붙여넣기 등으로 들어온 거대한 base64를 그대로 저장하면 본문이 수 MB가 되어 INSERT가 타임아웃(57014)된다.
async function inlineImagesToStorage(html){
  const div=document.createElement('div'); div.innerHTML=html;
  const imgs=Array.prototype.slice.call(div.querySelectorAll('img')).filter(im=>/^data:image\//i.test(im.getAttribute('src')||''));
  for(const im of imgs){
    const blob=await (await fetch(im.getAttribute('src'))).blob();
    const url=await sbup(blob,'post_'+me+'_'+Date.now()+'_'+Math.random().toString(36).slice(2,7)+'.jpg');
    im.setAttribute('src',url);
  }
  return div.innerHTML;
}

// 페이지 로드: 비밀번호 재설정 링크 처리 + 저장된 세션 자동 복구
async function initAuth(){
  const p=new URLSearchParams((location.hash||'').slice(1));
  if(p.get('type')==='recovery' && p.get('access_token')){
    const np=prompt('새 비밀번호를 입력하세요 (6자 이상):');
    if(np && np.length>=6){
      try{
        const r=await fetch(SB+'/auth/v1/user',{method:'PUT',headers:{'apikey':KEY,'Authorization':'Bearer '+p.get('access_token'),'Content-Type':'application/json'},body:JSON.stringify({password:np})});
        if(!r.ok)throw 0;
        alert('비밀번호가 변경되었습니다. 새 비밀번호로 로그인해주세요.');
      }catch(e){alert('변경에 실패했습니다. 재설정 링크가 만료되었을 수 있습니다.');}
    }else if(np!==null){alert('6자 이상으로 설정해주세요.');}
    history.replaceState(null,'',location.pathname);
    return;
  }
  try{
    const s=localStorage.getItem('tp_session');
    if(s){ SESSION=JSON.parse(s); await refreshSession(); if(SESSION){ await afterLogin(); } }
  }catch(e){ clearSession(); }
}
initAuth();
