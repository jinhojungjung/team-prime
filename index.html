  <div class="modal-box"><div id="detailContent"></div></div>
</div>

<script>
const SB='https://yoiytrwuojrgvjwsywlt.supabase.co';
const KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlvaXl0cnd1b2pyZ3Zqd3N5d2x0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk3Nzk2OTMsImV4cCI6MjA5NTM1NTY5M30.6Yvi5REKQmsjYBhwcHiwZUwfzFPA1bvVimPjSF1J0hs';
const MASTER='마이크레소프트';
const PINNED=['마블','루멘','버터'];
const BREEDER_ORDER=['마이크레소프트','슈프림크레','모프스튜디오','게코엑스','크레밍'];

let animals=[],hatchlings=[],posts=[],allAnimalsMeta=[],allHatchlingsMeta=[];
let activeBreeder='전체',activeMorphs=[],activeGender='전체';
let hActiveBreeder='전체',hActiveMorphs=[],hActiveGender='전체';
let currentTab='home',slideIdx=0,searchTimer=null;
let animalPage=1,hatchPage=1,animalDone=false,hatchDone=false,loadingMore=false;

async function get(path){
  const r=await fetch(SB+'/rest/v1/'+path,{headers:{'apikey':KEY,'Authorization':'Bearer '+KEY}});
  if(!r.ok) throw new Error(await r.text());
  return r.json();
}
async function patch(path,body){
  await fetch(SB+'/rest/v1/'+path,{method:'PATCH',headers:{'apikey':KEY,'Authorization':'Bearer '+KEY,'Content-Type':'application/json','Prefer':'return=minimal'},body:JSON.stringify(body)});
}

// 이미지 리사이즈: 표시 크기에 맞게 작은 버전을 받아 속도를 높임
// (Supabase Storage = 네이티브 변환, 그 외(R2 등) = weserv 무료 이미지 CDN)
function rs(url,w){
  if(!url) return url;
  if(url.indexOf('/storage/v1/object/public/')>=0)
    return url.replace('/object/public/','/render/image/public/')+(url.indexOf('?')<0?'?':'&')+'width='+w+'&resize=contain&quality=70';
  return 'https://images.weserv.nl/?url='+encodeURIComponent(url.replace(/^https?:\/\//,''))+'&w='+w+'&q=70&output=webp';
}

async function init(){
  // 전체 데이터 한번에 (이미지 포함, 쿼리 2개만)
  const [a, h] = await Promise.all([
    get('animals?select=id,name,code,morph,gender,image_url,image_url_2,owner_label,created_at&order=created_at.asc'),
    get('hatchlings?select=id,code,morph,gender,father_id,mother_id,owner_label,hatch_date,clutch_no&order=hatch_date.desc')
  ]);
  animals=a; hatchlings=h;
  allAnimalsMeta=a; allHatchlingsMeta=h;
  animalDone=true; hatchDone=true;
  buildFilters(); buildHFilters();
  renderMain(); renderHMain(); renderHome();
  loadPosts(); handleVisitor();
}

async function loadPosts(){
  try{ posts=await get('posts?select=id,title,category,author_label,created_at&order=created_at.desc'); renderPosts(); renderHome(); }catch(e){}
}

// ── 홈 (미리보기 대시보드)
function renderHome(){
  document.getElementById('statParents').textContent=animals.length;
  document.getElementById('statHatch').textContent=hatchlings.length;
  document.getElementById('statGuide').textContent=posts.length;
  const pPrev=sortByPinned(animals).slice(0,2);
  const hPrev=hatchlings.slice(0,2);
  let html='';
  html+='<div class="slabel"><h2>Parents</h2><span class="n">['+animals.length+']</span><span class="ln"></span><button class="more" onclick="switchTab(\'parents\')">전체 →</button></div>';
  html+='<div class="card-grid" style="padding:0 18px">'+pPrev.map(parentCard).join('')+'</div>';
  html+='<div class="slabel"><h2>Hatchlings</h2><span class="n">['+hatchlings.length+']</span><span class="ln"></span><button class="more" onclick="switchTab(\'hatchlings\')">전체 →</button></div>';
  html+='<div class="card-grid" style="padding:0 18px">'+hPrev.map(hatchCard).join('')+'</div>';
  if(posts.length){
    const p=posts[0]; const date=new Date(p.created_at).toLocaleDateString('ko-KR');
    html+='<div class="slabel"><h2>Guide</h2><span class="n">Journal</span><span class="ln"></span><button class="more" onclick="switchTab(\'guide\')">전체 →</button></div>';
    html+='<div style="padding:0 18px 8px"><div class="post-card" onclick="location.href=\'/post.html?id='+p.id+'\'"><div class="post-meta">'+(p.category?'<span class="post-cat">'+p.category+'</span>':'')+'<span class="post-author">'+(p.author_label||'')+'</span><span class="post-date">'+date+'</span></div><div class="post-title">'+p.title+'</div></div></div>';
  }
  const el=document.getElementById('homeContent');
  el.innerHTML=html; lazyLoad(el);
}

async function loadMoreAnimals(){
  if(animalDone||loadingMore) return; loadingMore=true;
  try{
    const more=await get('animals?select=id,name,code,morph,gender,image_url,image_url_2,owner_label,created_at&order=created_at.asc&limit=10&offset='+animalPage*10);
    if(more.length<10) animalDone=true;
    animals=[...animals,...more]; animalPage++;
    buildFilters(); renderMain();
  }catch(e){} loadingMore=false;
}

async function loadMoreHatch(){
  if(hatchDone||loadingMore) return; loadingMore=true;
  try{
    const more=await get('hatchlings?select=id,code,morph,gender,father_id,mother_id,owner_label,hatch_date,clutch_no&order=hatch_date.desc&limit=10&offset='+hatchPage*10);
    if(more.length<10) hatchDone=true;
    hatchlings=[...hatchlings,...more]; hatchPage++;
    buildHFilters(); renderHMain();
  }catch(e){} loadingMore=false;
}

function setupScroll(){}

async function handleVisitor(){
  try{
    const r=await get('visitor_count?id=eq.1');
    let cnt=r&&r[0]?r[0].count:0;
    if(!sessionStorage.getItem('tp_v')){ sessionStorage.setItem('tp_v','1'); cnt++; await patch('visitor_count?id=eq.1',{count:cnt}); }
    document.getElementById('visitorNum').textContent=cnt.toLocaleString();
  }catch(e){}
}

// ── 탭
function switchTab(tab){
  currentTab=tab; clearSearch();
  ['home','parents','hatchlings','guide'].forEach(t=>{
    document.getElementById('section-'+t).style.display=t===tab?'block':'none';
    document.getElementById('bnav-'+t).classList.toggle('on',t===tab);
  });
  if(tab==='home') renderHome();
  window.scrollTo(0,0);
}

// ── 전역 검색
function doGlobalSearch(){ clearTimeout(searchTimer); searchTimer=setTimeout(_search,200); }

function _search(){
  const q=document.getElementById('searchInput').value.trim().toLowerCase();
  const cb=document.getElementById('searchClear');
  if(!q){ clearSearch(); return; }
  cb.style.display='block';
  ['home','parents','hatchlings','guide'].forEach(t=>document.getElementById('section-'+t).style.display='none');
  document.getElementById('section-search').style.display='block';
  const pFound=animals.filter(a=>a.name.toLowerCase().includes(q)||(a.morph&&a.morph.toLowerCase().includes(q))||(a.code&&a.code.toLowerCase().includes(q)));
  const hFound=hatchlings.filter(h=>{
    const dad=animals.find(a=>a.id===h.father_id);
    const mom=animals.find(a=>a.id===h.mother_id);
    return h.code.toLowerCase().includes(q)||(h.morph&&h.morph.toLowerCase().includes(q))||(dad&&dad.name.toLowerCase().includes(q))||(mom&&mom.name.toLowerCase().includes(q));
  });
  const el=document.getElementById('searchResults');
  if(!pFound.length&&!hFound.length){ el.innerHTML='<div class="empty"><span class="empty-icon">😶</span>검색 결과가 없습니다</div>'; return; }
  let html='';
  if(pFound.length){ html+='<div class="result-label">부모 개체 '+pFound.length+'</div><div class="card-grid">'+sortByPinned(pFound).map(parentCard).join('')+'</div>'; }
  if(hFound.length){ html+='<div class="result-label"'+(pFound.length?' style="margin-top:20px"':'')+'>해칭 개체 '+hFound.length+'</div><div class="card-grid">'+hFound.map(hatchCard).join('')+'</div>'; }
  el.innerHTML=html; lazyLoad(el);
}

function clearSearch(){
  document.getElementById('searchInput').value='';
  document.getElementById('searchClear').style.display='none';
  document.getElementById('section-search').style.display='none';
  ['home','parents','hatchlings','guide'].forEach(t=>document.getElementById('section-'+t).style.display=t===currentTab?'block':'none');
}

// ── 필터
function buildFilters(){
  const src=allAnimalsMeta.length?allAnimalsMeta:animals;
  const existing=new Set(src.map(a=>a.owner_label).filter(Boolean));
  const breeders=['전체',...BREEDER_ORDER.filter(b=>existing.has(b)),...[...existing].filter(b=>!BREEDER_ORDER.includes(b))];
  const morphs=['전체',...new Set(src.flatMap(a=>(a.morph||'').split(' ')).filter(Boolean))].sort();
  const genders=['전체',...new Set(src.map(a=>a.gender).filter(Boolean))];
  document.getElementById('breederFilters').innerHTML=breeders.map(b=>'<button class="filter-chip'+(b===activeBreeder?' active':'')+'" onclick="setBreeder(\''+b+'\')">'+(b==='마이크레소프트'?'👑 '+b:b)+'</button>').join('');
  document.getElementById('morphFilters').innerHTML=morphs.map(m=>'<button class="filter-chip'+(m==='전체'&&!activeMorphs.length?' active':activeMorphs.includes(m)?' active':'')+'" onclick="setMorph(\''+m+'\')">'+m+'</button>').join('');
  document.getElementById('genderFilters').innerHTML=genders.map(g=>'<button class="filter-chip'+(g===activeGender?' active':'')+'" onclick="setGender(\''+g+'\')">'+(g==='수컷'?'♂&#xFE0E; 수컷':g==='암컷'?'♀&#xFE0E; 암컷':g)+'</button>').join('');
}
function buildHFilters(){
  const src=allHatchlingsMeta.length?allHatchlingsMeta:hatchlings;
  const existing=new Set(src.map(h=>h.owner_label).filter(Boolean));
  const breeders=['전체',...BREEDER_ORDER.filter(b=>existing.has(b)),...[...existing].filter(b=>!BREEDER_ORDER.includes(b))];
  const morphs=['전체',...new Set(src.flatMap(h=>(h.morph||'').split(' ')).filter(Boolean))].sort();
  const genders=['전체',...new Set(src.map(h=>h.gender).filter(Boolean))];
  document.getElementById('hBreederFilters').innerHTML=breeders.map(b=>'<button class="filter-chip'+(b===hActiveBreeder?' active':'')+'" onclick="setHBreeder(\''+b+'\')">'+(b==='마이크레소프트'?'👑 '+b:b)+'</button>').join('');
  document.getElementById('hMorphFilters').innerHTML=morphs.map(m=>'<button class="filter-chip'+(m==='전체'&&!hActiveMorphs.length?' active':hActiveMorphs.includes(m)?' active':'')+'" onclick="setHMorph(\''+m+'\')">'+m+'</button>').join('');
  document.getElementById('hGenderFilters').innerHTML=genders.map(g=>'<button class="filter-chip'+(g===hActiveGender?' active':'')+'" onclick="setHGender(\''+g+'\')">'+(g==='수컷'?'♂&#xFE0E; 수컷':g==='암컷'?'♀&#xFE0E; 암컷':g)+'</button>').join('');
}
function setBreeder(b){activeBreeder=b;buildFilters();renderMain();}
function setMorph(m){
  if(m==='전체'){activeMorphs=[];}
  else{
    const i=activeMorphs.indexOf(m);
    if(i>=0) activeMorphs.splice(i,1);
    else if(activeMorphs.length<2) activeMorphs.push(m);
  }
  buildFilters();renderMain();
}
function setGender(g){activeGender=g;buildFilters();renderMain();}
function setHBreeder(b){hActiveBreeder=b;buildHFilters();renderHMain();}
function setHMorph(m){
  if(m==='전체'){hActiveMorphs=[];}
  else{
    const i=hActiveMorphs.indexOf(m);
    if(i>=0) hActiveMorphs.splice(i,1);
    else if(hActiveMorphs.length<2) hActiveMorphs.push(m);
  }
  buildHFilters();renderHMain();
}
function setHGender(g){hActiveGender=g;buildHFilters();renderHMain();}

function applyFilters(list){
  return list.filter(a=>(activeBreeder==='전체'||a.owner_label===activeBreeder)&&(!activeMorphs.length||(a.morph&&activeMorphs.some(m=>a.morph.split(' ').includes(m))))&&(activeGender==='전체'||a.gender===activeGender));
}
function applyHFilters(list){
  return list.filter(h=>(hActiveBreeder==='전체'||h.owner_label===hActiveBreeder)&&(!hActiveMorphs.length||(h.morph&&hActiveMorphs.some(m=>h.morph.split(' ').includes(m))))&&(hActiveGender==='전체'||h.gender===hActiveGender));
}

// ── 부모 개체
function sortByPinned(list){
  const pinned=PINNED.map(n=>list.find(x=>x.name===n)).filter(Boolean);
  const rest=list.filter(x=>!PINNED.includes(x.name)).sort((a,b)=>a.name.localeCompare(b.name,'ko'));
  return [...pinned,...rest];
}
function genderBadge(g){
  if(!g) return '';
  if(g==='수컷') return '<span class="badge gender-m">♂&#xFE0E; 수컷</span>';
  if(g==='암컷') return '<span class="badge gender-f">♀&#xFE0E; 암컷</span>';
  return '<span class="badge">'+g+'</span>';
}

function renderMain(){
  const el=document.getElementById('results');
  const list=sortByPinned(applyFilters(animals));
  if(!list.length){ el.innerHTML='<div class="empty"><span class="empty-icon">🦎</span>등록된 개체가 없습니다</div>'; return; }
  el.innerHTML='<div class="result-label">'+list.length+' 마리</div><div class="card-grid">'+list.map(parentCard).join('')+'</div>';
  lazyLoad(el);
}

function parentCard(a){
  const img=a.image_url?'<img data-src="'+rs(a.image_url,400)+'" alt="'+a.name+'" loading="lazy" decoding="async">':'<span class="emoji">🦎</span>';
  const morphs=a.morph?a.morph.split(' ').filter(Boolean).map(m=>'<span class="mbadge">'+m+'</span>').join(''):'';
  return '<div class="card" onclick="openParent(\''+a.id+'\')">'+
    '<div class="photo">'+img+'<div class="frame"></div>'+(a.code?'<div class="no">'+a.code+'</div>':'')+(a.owner_label===MASTER?'<div class="crown">MASTER</div>':'')+'</div>'+
    '<div class="cbody"><div class="cname">'+a.name+'</div>'+
    (morphs?'<div class="morphs">'+morphs+'</div>':'')+
    '<div class="crow"><span class="badge owner">'+a.owner_label+'</span>'+genderBadge(a.gender)+'</div></div></div>';
}

function openParent(id){
  const a=animals.find(x=>x.id===id); if(!a) return;
  const photos=[a.image_url,a.image_url_2].filter(Boolean);
  const kids=hatchlings.filter(h=>h.father_id===id||h.mother_id===id);
  let kidsHtml='';
  if(kids.length){
    kidsHtml='<div class="sec-title">해칭 개체 ('+kids.length+')</div>'+
      kids.map(h=>'<div class="parent-link" onclick="closeDetail();setTimeout(function(){switchTab(\'hatchlings\');openHatch(\''+h.id+'\')},200)"><span class="parent-name" style="font-family:monospace;font-size:13px">'+h.code+'</span><span class="parent-arrow">▶</span></div>').join('');
  }
  document.getElementById('detailContent').innerHTML=
    heroHtml(photos)+
    '<div class="modal-inner">'+
    '<div class="detail-name">'+a.name+'</div>'+
    (a.code?'<div class="detail-code">'+a.code+'</div>':'')+
    '<div style="margin-top:10px">'+
    (a.gender?'<div class="detail-row"><span>성별</span><span>'+a.gender+'</span></div>':'')+
    (a.morph?'<div class="detail-row"><span>모프</span><span>'+a.morph+'</span></div>':'')+
    '<div class="detail-row"><span>브리더</span><span>'+a.owner_label+'</span></div>'+
    '</div>'+kidsHtml+
    '<div class="btn-row">'+
    '<button class="close-btn" style="flex:1" onclick="closeDetail()">닫기</button>'+
    '<button class="close-btn btn-black" style="flex:1" onclick="location.href=\'/genealogy.html?id='+a.id+'&type=parent\'">🌿 가계도</button>'+
    '</div></div>';
  document.getElementById('detailModal').classList.add('open');
}

// ── 해칭 개체
function renderHMain(){
  const el=document.getElementById('hResults');
  const list=applyHFilters(hatchlings);
  if(!list.length){ el.innerHTML='<div class="empty"><span class="empty-icon">🥚</span>등록된 해칭 개체가 없습니다</div>'; return; }
  el.innerHTML='<div class="result-label">'+list.length+' 마리</div><div class="card-grid">'+list.map(hatchCard).join('')+'</div>';
}

function hatchCard(h){
  const dad=animals.find(a=>a.id===h.father_id);
  const mom=animals.find(a=>a.id===h.mother_id);
  const parents=[dad&&dad.name,mom&&mom.name].filter(Boolean).join(' × ');
  return '<div class="card" onclick="openHatch(\''+h.id+'\')">'+
    '<div class="photo"><span class="emoji">🥚</span><div class="frame"></div>'+(h.code?'<div class="no">'+h.code+'</div>':'')+(h.owner_label===MASTER?'<div class="crown">MASTER</div>':'')+'</div>'+
    '<div class="cbody"><div class="cmorph">'+(h.morph||'모프 미구분')+'</div>'+
    (parents?'<div class="parents">'+parents+'</div>':'')+
    '<div class="crow"><span class="badge owner">'+h.owner_label+'</span>'+genderBadge(h.gender)+'</div></div></div>';
}

function openHatch(id){
  const h=hatchlings.find(x=>x.id===id); if(!h) return;
  const dad=animals.find(a=>a.id===h.father_id);
  const mom=animals.find(a=>a.id===h.mother_id);
  const date=h.hatch_date?new Date(h.hatch_date).toLocaleDateString('ko-KR'):'';
  let parentsHtml='';
  if(dad||mom){
    parentsHtml='<div class="sec-title">부모 개체</div>'+
      (dad?'<div class="parent-link" onclick="closeDetail();setTimeout(function(){switchTab(\'parents\');openParent(\''+dad.id+'\')},200)"><span><span style="color:#aaa;font-size:11px">부 · </span><span class="parent-name">'+dad.name+'</span></span><span class="parent-arrow">▶</span></div>':'')+
      (mom?'<div class="parent-link" onclick="closeDetail();setTimeout(function(){switchTab(\'parents\');openParent(\''+mom.id+'\')},200)"><span><span style="color:#aaa;font-size:11px">모 · </span><span class="parent-name">'+mom.name+'</span></span><span class="parent-arrow">▶</span></div>':'');
  }
  document.getElementById('detailContent').innerHTML=
    '<div style="height:130px;background:linear-gradient(155deg,#26292e,#0f1012);display:flex;align-items:center;justify-content:center;font-size:60px;filter:grayscale(1) opacity(.85)">🥚</div>'+
    '<div class="modal-inner">'+
    '<div class="detail-code" style="font-size:13px;font-weight:700;color:var(--ink)">'+h.code+'</div>'+
    '<div class="detail-name" style="font-size:18px;margin-top:4px">'+(h.morph||'모프 미구분')+'</div>'+
    '<div style="margin-top:10px">'+
    (h.gender?'<div class="detail-row"><span>성별</span><span>'+h.gender+'</span></div>':'')+
    (date?'<div class="detail-row"><span>해칭일</span><span>'+date+'</span></div>':'')+
    (h.clutch_no?'<div class="detail-row"><span>클러치</span><span>'+h.clutch_no+'번</span></div>':'')+
    '<div class="detail-row"><span>브리더</span><span>'+h.owner_label+'</span></div>'+
    '</div>'+parentsHtml+
    '<div class="btn-row">'+
    '<button class="close-btn" style="flex:1" onclick="closeDetail()">닫기</button>'+
    '<button class="close-btn btn-black" style="flex:1" onclick="location.href=\'/genealogy.html?id='+h.id+'&type=hatch\'">🌿 가계도</button>'+
    '</div></div>';
  document.getElementById('detailModal').classList.add('open');
}

// ── 게시글
function renderPosts(){
  const el=document.getElementById('postResults');
  if(!posts.length){ el.innerHTML='<div class="empty"><span class="empty-icon">📖</span>등록된 게시글이 없습니다</div>'; return; }
  el.innerHTML=posts.map(p=>{
    const date=new Date(p.created_at).toLocaleDateString('ko-KR');
    const preview='';
    return '<div class="post-card" onclick="location.href=\'/post.html?id='+p.id+'\'"><div class="post-meta">'+(p.category?'<span class="post-cat">'+p.category+'</span>':'')+'<span class="post-author">'+(p.author_label||'')+'</span><span class="post-date">'+date+'</span></div><div class="post-title">'+p.title+'</div><div class="post-preview">'+preview+'</div></div>';
  }).join('');
}

// ── 공통
function heroHtml(photos){
  if(!photos.length) return '<div style="height:170px;background:linear-gradient(155deg,#2b2e33,#121316);display:flex;align-items:center;justify-content:center;font-size:60px;filter:grayscale(1) opacity(.85)">🦎</div>';
  if(photos.length===1) return '<div class="photo-slider"><img src="'+rs(photos[0],800)+'" alt="사진" style="opacity:1"></div>';
  return '<div class="photo-slider" id="slider"><img src="'+rs(photos[0],800)+'" id="slide0" alt="사진1" style="opacity:1"><img src="'+rs(photos[1],800)+'" id="slide1" alt="사진2" class="hidden"><button class="photo-nav prev" onclick="slide(-1)">&#8249;</button><button class="photo-nav next" onclick="slide(1)">&#8250;</button><div class="photo-dots"><div class="photo-dot active" id="dot0" onclick="goSlide(0)"></div><div class="photo-dot" id="dot1" onclick="goSlide(1)"></div></div></div>';
}
function slide(dir){goSlide(slideIdx+dir);}
function goSlide(idx){
  const imgs=document.querySelectorAll('#slider img'); if(!imgs.length) return;
  slideIdx=(idx+imgs.length)%imgs.length;
  imgs.forEach((img,i)=>img.classList.toggle('hidden',i!==slideIdx));
  document.querySelectorAll('.photo-dot').forEach((d,i)=>d.classList.toggle('active',i===slideIdx));
}
function closeDetail(){document.getElementById('detailModal').classList.remove('open');}
function lazyLoad(el){
  if('IntersectionObserver' in window){
    const obs=new IntersectionObserver(e=>{e.forEach(x=>{if(x.isIntersecting){const img=x.target;img.src=img.dataset.src;obs.unobserve(img);}});},{rootMargin:'100px'});
    el.querySelectorAll('img[data-src]').forEach(img=>obs.observe(img));
  } else el.querySelectorAll('img[data-src]').forEach(img=>img.src=img.dataset.src);
}

init();
</script>
</body>
