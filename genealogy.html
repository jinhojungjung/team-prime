<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#ffffff">
<title>가계도 — TEAM.PRIME</title>
<link rel="stylesheet" href="/style.css">
</head>
<body>
<div class="app">
  <div class="header">
    <button class="header-back" onclick="goBack()">←</button>
    <div>
      <div class="logo" id="headerTitle">가계도</div>
      <div class="sub">TEAM.PRIME</div>
    </div>
  </div>
  <div style="display:flex;gap:14px;padding:10px 16px;border-bottom:1px solid #eee;flex-wrap:wrap">
    <div style="display:flex;align-items:center;gap:5px;font-size:11px;color:#666"><div style="width:10px;height:10px;border-radius:50%;background:#4a7cf7;flex-shrink:0"></div>수컷</div>
    <div style="display:flex;align-items:center;gap:5px;font-size:11px;color:#666"><div style="width:10px;height:10px;border-radius:50%;background:#e06faa;flex-shrink:0"></div>암컷</div>
    <div style="display:flex;align-items:center;gap:5px;font-size:11px;color:#666"><div style="width:10px;height:10px;border-radius:50%;background:#888;flex-shrink:0"></div>해칭</div>
    <div style="display:flex;align-items:center;gap:5px;font-size:11px;color:#666"><div style="width:10px;height:10px;border-radius:2px;background:#f5a623;flex-shrink:0"></div>기준</div>
  </div>
  <div class="canvas-wrap" id="canvasWrap">
    <div class="loading">가계도 불러오는 중...</div>
  </div>
  <div id="infoPanel" style="border-top:1px solid #000;padding:14px 16px;background:#fff;min-height:72px">
    <div style="color:#bbb;font-size:13px">노드를 탭해서 정보를 확인하세요</div>
  </div>
</div>

<script>
const SB='https://yoiytrwuojrgvjwsywlt.supabase.co';
const KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlvaXl0cnd1b2pyZ3Zqd3N5d2x0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk3Nzk2OTMsImV4cCI6MjA5NTM1NTY5M30.6Yvi5REKQmsjYBhwcHiwZUwfzFPA1bvVimPjSF1J0hs';

let allAnimals=[], allHatchlings=[];

const NW=148, NH=60;
const PAD=16;
const HGAP=12;
const VGAP=70;
const COUPLE_GAP=40; // 커플 블록 간 수직 간격

async function get(path){
  const r=await fetch(SB+'/rest/v1/'+path,{headers:{'apikey':KEY,'Authorization':'Bearer '+KEY}});
  return r.json();
}

async function init(){
  const p=new URLSearchParams(location.search);
  const focusId=p.get('id');
  const focusType=p.get('type')||'parent';
  const [a,h]=await Promise.all([
    get('animals?select=id,name,code,morph,gender,owner_label&order=name.asc'),
    get('hatchlings?select=id,code,morph,gender,father_id,mother_id,owner_label,hatch_date&order=hatch_date.asc')
  ]);
  allAnimals=a; allHatchlings=h;
  if(!focusId){ mount('<div class="empty">개체 정보가 없습니다</div>'); return; }
  if(focusType==='parent'){
    const focus=allAnimals.find(x=>x.id===focusId);
    if(!focus){ mount('<div class="empty">개체를 찾을 수 없습니다</div>'); return; }
    document.getElementById('headerTitle').textContent=focus.name;
    drawParentTree(focus);
  } else {
    const focus=allHatchlings.find(x=>x.id===focusId);
    if(!focus){ mount('<div class="empty">개체를 찾을 수 없습니다</div>'); return; }
    document.getElementById('headerTitle').textContent=focus.code;
    drawHatchTree(focus);
  }
}

// ── 부모 개체 기준 ────────────────────────────────
// 커플별로 세로로 쌓기
// 각 커플 블록:
//   [파트너] ─── [기준(복사)]
//                    │
//              해칭1, 해칭2, ...
function drawParentTree(focus){
  const myKids=allHatchlings.filter(h=>h.father_id===focus.id||h.mother_id===focus.id);

  // 커플 그룹핑
  const coupleMap={};
  myKids.forEach(h=>{
    const pid=h.father_id===focus.id?h.mother_id:h.father_id;
    const key=pid||'__none__';
    if(!coupleMap[key]) coupleMap[key]={pid,kids:[]};
    coupleMap[key].kids.push(h);
  });
  const couples=Object.values(coupleMap);

  // 해칭 없으면 단독
  if(!couples.length){
    const svgW=NW+PAD*2;
    const svgH=NH+PAD*2;
    const svg=mkSVG(svgW,svgH);
    addNode(svg,PAD,PAD,focus,'parent',true);
    mount(svg); return;
  }

  // 각 커플 블록 높이 계산
  // 블록 = 위행(NH) + VGAP + 아래행(NH 해칭들)  or 해칭없으면 위행만
  const blockHeights=couples.map(c=>c.kids.length>0?NH+VGAP+NH:NH);

  // SVG 전체 높이
  const totalH=PAD+blockHeights.reduce((a,b)=>a+b,0)+COUPLE_GAP*(couples.length-1)+PAD;

  // SVG 너비: 파트너 + 간격 + 기준 or 해칭들 중 큰 것
  const maxKidsW=Math.max(...couples.map(c=>c.kids.length*(NW+HGAP)-HGAP));
  const svgW=Math.max(NW*2+HGAP*4, maxKidsW)+PAD*2;

  const svg=mkSVG(svgW, totalH);

  // 커플별 블록 그리기
  let curY=PAD;
  couples.forEach((couple,ci)=>{
    const partner=couple.pid?allAnimals.find(a=>a.id===couple.pid):null;
    const blockH=blockHeights[ci];
    const rowY=curY;
    const kidsY=rowY+NH+VGAP;

    // 파트너 + 기준 가로 배치
    // 기준은 오른쪽, 파트너는 왼쪽
    const focusX=svgW-PAD-NW;
    const focusCX=focusX+NW/2;
    const partnerX=PAD;
    const partnerCX=partnerX+NW/2;

    // 기준 개체 (매 커플마다)
    addNode(svg, focusX, rowY, focus, 'parent', true);

    if(partner){
      addNode(svg, partnerX, rowY, partner, 'parent', false);
      // 파트너 ─── 기준 연결선 (수평 점선)
      const lineY=rowY+NH/2;
      addLine(svg, partnerX+NW, lineY, focusX, lineY, true);
      // 중점에서 아래로
      const midX=(partnerCX+focusCX)/2;
      if(couple.kids.length>0){
        addLine(svg, midX, lineY, midX, kidsY, false);
        drawKids(svg, couple.kids, midX, kidsY);
      }
    } else {
      // 파트너 없음 → 기준에서 바로 아래
      if(couple.kids.length>0){
        addLine(svg, focusCX, rowY+NH, focusCX, kidsY, false);
        drawKids(svg, couple.kids, focusCX, kidsY);
      }
    }

    curY+=blockH+COUPLE_GAP;

    // 커플 구분선 (마지막 제외)
    if(ci<couples.length-1){
      const divY=curY-COUPLE_GAP/2;
      const div=document.createElementNS('http://www.w3.org/2000/svg','line');
      div.setAttribute('x1',PAD); div.setAttribute('y1',divY);
      div.setAttribute('x2',svgW-PAD); div.setAttribute('y2',divY);
      div.setAttribute('stroke','#eee'); div.setAttribute('stroke-width','1');
      div.setAttribute('stroke-dasharray','4,4');
      svg.appendChild(div);
    }
  });

  mount(svg);
}

function drawKids(svg, kids, midX, kidsY){
  const kidsW=kids.length*(NW+HGAP)-HGAP;
  const kidsStartX=midX-kidsW/2;
  kids.forEach((h,i)=>{
    const kx=kidsStartX+i*(NW+HGAP);
    addNode(svg, kx, kidsY, h, 'hatch', false);
    if(kids.length===1){
      // 직선
    } else {
      // 엘보우
      addElbow(svg, midX, kidsY, kx+NW/2, kidsY);
    }
  });
}

// ── 해칭 기준 ─────────────────────────────────────
function drawHatchTree(focus){
  const father=allAnimals.find(a=>a.id===focus.father_id);
  const mother=allAnimals.find(a=>a.id===focus.mother_id);
  const kids=allHatchlings.filter(g=>g.father_id===focus.id||g.mother_id===focus.id);

  const row1Y=PAD;
  const row2Y=row1Y+NH+VGAP;
  const row3Y=row2Y+NH+VGAP;
  const hasKids=kids.length>0;
  const svgH=row2Y+NH+(hasKids?VGAP+NH:0)+PAD;

  const kidsW=hasKids?kids.length*(NW+HGAP)-HGAP:0;
  const svgW=Math.max(NW*2+HGAP*4, kidsW)+PAD*2;
  const cx=svgW/2;

  const svg=mkSVG(svgW, svgH);

  if(father&&mother){
    const fX=cx-NW-HGAP*2;
    const mX=cx+HGAP*2;
    addNode(svg, fX, row1Y, father, 'parent', false);
    addNode(svg, mX, row1Y, mother, 'parent', false);
    const lineY=row1Y+NH/2;
    addLine(svg, fX+NW, lineY, mX, lineY, true);
    addLine(svg, cx, lineY, cx, row2Y, false);
  } else if(father){
    addNode(svg, cx-NW/2, row1Y, father, 'parent', false);
    addLine(svg, cx, row1Y+NH, cx, row2Y, false);
  } else if(mother){
    addNode(svg, cx-NW/2, row1Y, mother, 'parent', false);
    addLine(svg, cx, row1Y+NH, cx, row2Y, false);
  }

  addNode(svg, cx-NW/2, row2Y, focus, 'hatch', true);

  if(hasKids){
    addLine(svg, cx, row2Y+NH, cx, row3Y, false);
    drawKids(svg, kids, cx, row3Y);
  }

  mount(svg);
}

// ── SVG 헬퍼 ──────────────────────────────────────
function mkSVG(w,h){
  const svg=document.createElementNS('http://www.w3.org/2000/svg','svg');
  svg.setAttribute('width',w); svg.setAttribute('height',h);
  svg.setAttribute('viewBox','0 0 '+w+' '+h);
  svg.style.display='block'; svg.style.margin='0 auto';
  return svg;
}

function addNode(svg,x,y,data,type,isFocus){
  let fill,stroke,sw,tc;
  if(isFocus){fill='#fff7e6';stroke='#f5a623';sw=2.5;tc='#a06000';}
  else if(type==='hatch'){fill='#f5f5f5';stroke='#aaa';sw=1;tc='#444';}
  else if(data.gender==='수컷'){fill='#e8f0fe';stroke='#4a7cf7';sw=1;tc='#2a5cd4';}
  else if(data.gender==='암컷'){fill='#fce8f3';stroke='#e06faa';sw=1;tc='#c0427e';}
  else{fill='#f5f5f5';stroke='#aaa';sw=1;tc='#444';}

  const g=document.createElementNS('http://www.w3.org/2000/svg','g');
  g.style.cursor='pointer';
  g.addEventListener('click',()=>showInfo(data,type));

  const rect=document.createElementNS('http://www.w3.org/2000/svg','rect');
  rect.setAttribute('x',x);rect.setAttribute('y',y);
  rect.setAttribute('width',NW);rect.setAttribute('height',NH);
  rect.setAttribute('rx','10');rect.setAttribute('fill',fill);
  rect.setAttribute('stroke',stroke);rect.setAttribute('stroke-width',sw);
  g.appendChild(rect);

  const cx=x+NW/2;
  const label=type==='parent'?data.name:data.code;
  const morph=data.morph||'';
  const sub=type==='parent'?(data.gender?data.gender+' · ':'')+data.owner_label:(data.owner_label||'');

  [[label,20,13,'700','1'],[morph,36,11,'400','0.9'],[sub,50,10,'400','0.7']].forEach(([txt,dy,sz,fw,op])=>{
    if(!txt) return;
    const t=document.createElementNS('http://www.w3.org/2000/svg','text');
    t.setAttribute('x',cx);t.setAttribute('y',y+dy);
    t.setAttribute('text-anchor','middle');t.setAttribute('font-size',sz);
    t.setAttribute('font-weight',fw);t.setAttribute('fill',tc);
    t.setAttribute('font-family','-apple-system,sans-serif');t.setAttribute('opacity',op);
    const max=Math.floor(NW/sz*1.6);
    t.textContent=txt.length>max?txt.slice(0,max-1)+'…':txt;
    g.appendChild(t);
  });
  svg.appendChild(g);
}

function addLine(svg,x1,y1,x2,y2,dash){
  const l=document.createElementNS('http://www.w3.org/2000/svg','line');
  l.setAttribute('x1',x1);l.setAttribute('y1',y1);l.setAttribute('x2',x2);l.setAttribute('y2',y2);
  l.setAttribute('stroke','#ccc');l.setAttribute('stroke-width','1.5');
  if(dash) l.setAttribute('stroke-dasharray','5,4');
  svg.insertBefore(l,svg.firstChild);
}

function addElbow(svg,fromX,fromY,toX,toY){
  const mid=(fromY+toY)/2;
  const p=document.createElementNS('http://www.w3.org/2000/svg','path');
  p.setAttribute('d','M'+fromX+','+fromY+' L'+fromX+','+mid+' L'+toX+','+mid+' L'+toX+','+toY);
  p.setAttribute('fill','none');p.setAttribute('stroke','#ccc');p.setAttribute('stroke-width','1.5');
  svg.insertBefore(p,svg.firstChild);
}

function mount(content){
  const w=document.getElementById('canvasWrap');
  if(typeof content==='string') w.innerHTML=content;
  else{ w.innerHTML=''; w.appendChild(content); }
}

function showInfo(data,type){
  const el=document.getElementById('infoPanel');
  if(type==='parent'){
    const kids=allHatchlings.filter(h=>h.father_id===data.id||h.mother_id===data.id);
    el.innerHTML='<div style="font-size:15px;font-weight:700;color:#000;margin-bottom:3px">'+data.name+'</div>'+
      '<div style="font-size:12px;color:#888;line-height:1.6">'+
      (data.code?'코드: '+data.code+'<br>':'')+
      (data.morph?'모프: '+data.morph+'<br>':'')+
      (data.gender?'성별: '+data.gender+'<br>':'')+
      '브리더: '+(data.owner_label||'')+
      (kids.length?'<br>해칭 개체: '+kids.length+'마리':'')+
      '</div>'+
      '<span class="info-link" onclick="location.href=\'/genealogy.html?id='+data.id+'&type=parent\'">이 개체 기준 가계도 →</span>';
  } else {
    const dad=allAnimals.find(a=>a.id===data.father_id);
    const mom=allAnimals.find(a=>a.id===data.mother_id);
    const date=data.hatch_date?new Date(data.hatch_date).toLocaleDateString('ko-KR'):'';
    el.innerHTML='<div style="font-size:13px;font-weight:700;color:#000;margin-bottom:3px;font-family:monospace">'+data.code+'</div>'+
      '<div style="font-size:12px;color:#888;line-height:1.6">'+
      (data.morph?'모프: '+data.morph+'<br>':'')+
      (data.gender?'성별: '+data.gender+'<br>':'')+
      (date?'해칭일: '+date+'<br>':'')+
      (dad?'부: '+dad.name+'<br>':'')+
      (mom?'모: '+mom.name+'<br>':'')+
      '브리더: '+(data.owner_label||'')+
      '</div>'+
      '<span class="info-link" onclick="location.href=\'/genealogy.html?id='+data.id+'&type=hatch\'">이 개체 기준 가계도 →</span>';
  }
}

function goBack(){
  if(document.referrer&&document.referrer.includes(location.hostname)) history.back();
  else location.href='/';
}

init();
</script>
</body>
</html>
