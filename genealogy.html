<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#ffffff">
<title>가계도 — TEAM.PRIME</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#fff;display:flex;justify-content:center}
.app{width:100%;max-width:430px;background:#fff;min-height:100vh;display:flex;flex-direction:column}
.header{padding:16px;border-bottom:1px solid #000;display:flex;align-items:center;gap:12px;position:sticky;top:0;background:#fff;z-index:10}
.back-btn{background:none;border:none;cursor:pointer;font-size:20px;color:#000;padding:0}
.header-title{font-size:16px;font-weight:700;color:#000;letter-spacing:0.04em}
.header-sub{font-size:11px;color:#888;margin-top:1px}
.legend{display:flex;gap:10px;padding:10px 16px;border-bottom:1px solid #eee;flex-wrap:wrap}
.leg{display:flex;align-items:center;gap:5px;font-size:11px;color:#666}
.leg-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.canvas-wrap{overflow:auto;flex:1;padding:16px 0}
#treeCanvas{display:block;margin:0 auto}
.info-panel{border-top:1px solid #000;padding:14px 16px;background:#fff;min-height:80px}
.info-name{font-size:16px;font-weight:700;color:#000;margin-bottom:4px}
.info-meta{font-size:12px;color:#888;line-height:1.6}
.info-link{display:inline-block;margin-top:8px;font-size:12px;color:#000;text-decoration:underline;cursor:pointer}
.empty{text-align:center;padding:60px 20px;color:#bbb;font-size:14px}
.loading{text-align:center;padding:60px;color:#bbb;font-size:14px}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <button class="back-btn" onclick="goBack()">←</button>
    <div>
      <div class="header-title" id="headerTitle">가계도</div>
      <div class="header-sub">TEAM.PRIME</div>
    </div>
  </div>
  <div class="legend">
    <div class="leg"><div class="leg-dot" style="background:#4a7cf7"></div>수컷</div>
    <div class="leg"><div class="leg-dot" style="background:#e06faa"></div>암컷</div>
    <div class="leg"><div class="leg-dot" style="background:#888"></div>해칭</div>
    <div class="leg"><div class="leg-dot" style="background:#f5a623;border-radius:2px"></div>기준 개체</div>
  </div>
  <div class="canvas-wrap" id="canvasWrap">
    <div class="loading">가계도 불러오는 중...</div>
  </div>
  <div class="info-panel" id="infoPanel">
    <div style="color:#bbb;font-size:13px">노드를 탭해서 정보를 확인하세요</div>
  </div>
</div>

<script>
const SB='https://yoiytrwuojrgvjwsywlt.supabase.co';
const KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlvaXl0cnd1b2pyZ3Zqd3N5d2x0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk3Nzk2OTMsImV4cCI6MjA5NTM1NTY5M30.6Yvi5REKQmsjYBhwcHiwZUwfzFPA1bvVimPjSF1J0hs';

let allAnimals=[], allHatchlings=[], focusId=null, focusType=null;

async function get(path){
  const r=await fetch(SB+'/rest/v1/'+path,{headers:{'apikey':KEY,'Authorization':'Bearer '+KEY}});
  return r.json();
}

async function init(){
  const params=new URLSearchParams(location.search);
  focusId=params.get('id');
  focusType=params.get('type')||'parent'; // parent or hatch

  const [a,h]=await Promise.all([
    get('animals?select=id,name,code,morph,gender,owner_label&order=name.asc'),
    get('hatchlings?select=id,code,morph,gender,father_id,mother_id,owner_label,hatch_date&order=hatch_date.asc')
  ]);
  allAnimals=a; allHatchlings=h;

  if(!focusId){
    document.getElementById('canvasWrap').innerHTML='<div class="empty">개체 정보가 없습니다</div>';
    return;
  }

  const focus=focusType==='parent'
    ? allAnimals.find(x=>x.id===focusId)
    : allHatchlings.find(x=>x.id===focusId);

  if(!focus){
    document.getElementById('canvasWrap').innerHTML='<div class="empty">개체를 찾을 수 없습니다</div>';
    return;
  }

  document.getElementById('headerTitle').textContent=focusType==='parent'?focus.name:focus.code;
  buildTree(focus);
}

function buildTree(focus){
  const nodes=[];
  const edges=[];
  const W=160, H=56, HGAP=20, VGAP=60;

  if(focusType==='parent'){
    // 부모 개체 기준: 조상 + 본인 + 자손
    const kids=allHatchlings.filter(h=>h.father_id===focus.id||h.mother_id===focus.id);
    const father=focus.father_id?allAnimals.find(a=>a.id===focus.father_id):null;
    const mother=focus.mother_id?allAnimals.find(a=>a.id===focus.mother_id):null;

    // 레이아웃 계산
    const totalCols=Math.max(kids.length,2);
    const svgW=Math.max(totalCols*(W+HGAP)+HGAP, 360);

    // 부모(조상) 행
    const parentY=20;
    const cx=svgW/2;

    // 기준 개체
    nodes.push({id:focus.id,type:'parent',data:focus,x:cx-W/2,y:120,focus:true});

    // 파트너들 (해칭을 통해 연결된 상대방)
    const partnerIds=new Set();
    kids.forEach(h=>{
      const partnerId=h.father_id===focus.id?h.mother_id:h.father_id;
      if(partnerId) partnerIds.add(partnerId);
    });
    const partners=[...partnerIds].map(pid=>allAnimals.find(a=>a.id===pid)).filter(Boolean);

    // 파트너 노드
    partners.forEach((p,i)=>{
      const px=(i+1)*(svgW/(partners.length+1))-W/2;
      nodes.push({id:p.id,type:'parent',data:p,x:px,y:parentY,focus:false});
      // 점선 연결 (짝짓기)
      edges.push({from:{x:px+W/2,y:parentY+H},to:{x:cx,y:120},dash:true,mateOf:focus.id});
    });

    // 해칭 자식
    const kidsY=120+H+VGAP;
    kids.forEach((h,i)=>{
      const kx=(i+0.5)*(svgW/kids.length)-W/2;
      nodes.push({id:h.id,type:'hatch',data:h,x:kx,y:kidsY,focus:false});
      edges.push({from:{x:cx,y:120+H},to:{x:kx+W/2,y:kidsY},dash:false});
    });

    // 손자 (해칭의 자식)
    let grandY=kidsY+H+VGAP;
    let grandIdx=0;
    const grandTotal=kids.reduce((acc,h)=>{
      const gc=allHatchlings.filter(g=>g.father_id===h.id||g.mother_id===h.id);
      return acc+gc.length;
    },0);
    kids.forEach((h,i)=>{
      const grandKids=allHatchlings.filter(g=>g.father_id===h.id||g.mother_id===h.id);
      const kx=(i+0.5)*(svgW/kids.length)-W/2;
      grandKids.forEach((g,j)=>{
        const gx=(grandIdx+0.5)*(svgW/Math.max(grandTotal,1))-W/2;
        nodes.push({id:g.id,type:'hatch',data:g,x:gx,y:grandY,focus:false,grand:true});
        edges.push({from:{x:kx+W/2,y:kidsY+H},to:{x:gx+W/2,y:grandY},dash:false,thin:true});
        grandIdx++;
      });
    });

    const svgH=grandTotal>0?grandY+H+30:kidsY+H+30;
    render(nodes,edges,svgW,svgH,W,H,focus.id);

  } else {
    // 해칭 기준: 부모(조상) + 본인
    const h=focus;
    const father=allAnimals.find(a=>a.id===h.father_id);
    const mother=allAnimals.find(a=>a.id===h.mother_id);
    const svgW=360;
    const cx=svgW/2;

    if(father) nodes.push({id:father.id,type:'parent',data:father,x:40,y:20,focus:false});
    if(mother) nodes.push({id:mother.id,type:'parent',data:mother,x:200,y:20,focus:false});
    nodes.push({id:h.id,type:'hatch',data:h,x:cx-W/2,y:120,focus:true});

    if(father) edges.push({from:{x:40+W/2,y:20+H},to:{x:cx,y:120},dash:false});
    if(mother) edges.push({from:{x:200+W/2,y:20+H},to:{x:cx,y:120},dash:false});
    if(father&&mother){
      edges.push({from:{x:40+W,y:48},to:{x:200,y:48},dash:true,horizontal:true});
    }

    // 해칭의 자식들
    const kids=allHatchlings.filter(g=>g.father_id===h.id||g.mother_id===h.id);
    const kidsY=120+H+VGAP;
    kids.forEach((k,i)=>{
      const kx=(i+0.5)*(svgW/Math.max(kids.length,1))-W/2;
      nodes.push({id:k.id,type:'hatch',data:k,x:kx,y:kidsY,focus:false});
      edges.push({from:{x:cx,y:120+H},to:{x:kx+W/2,y:kidsY},dash:false});
    });

    const svgH=kids.length>0?kidsY+H+30:120+H+30;
    render(nodes,edges,svgW,svgH,W,H,h.id);
  }
}

function nodeColor(n){
  if(n.focus) return {fill:'#fff7e6',stroke:'#f5a623'};
  if(n.type==='hatch') return {fill:'#f5f5f5',stroke:'#999'};
  const g=n.data.gender;
  if(g==='수컷') return {fill:'#e8f0fe',stroke:'#4a7cf7'};
  if(g==='암컷') return {fill:'#fce8f3',stroke:'#e06faa'};
  return {fill:'#f5f5f5',stroke:'#999'};
}

function nodeTextColor(n){
  if(n.focus) return '#a06000';
  if(n.type==='hatch') return '#444';
  const g=n.data.gender;
  if(g==='수컷') return '#2a5cd4';
  if(g==='암컷') return '#c0427e';
  return '#444';
}

function render(nodes,edges,svgW,svgH,W,H,focusNodeId){
  const wrap=document.getElementById('canvasWrap');
  const svg=document.createElementNS('http://www.w3.org/2000/svg','svg');
  svg.id='treeCanvas';
  svg.setAttribute('width',Math.max(svgW,360));
  svg.setAttribute('height',svgH);
  svg.setAttribute('viewBox',`0 0 ${Math.max(svgW,360)} ${svgH}`);

  // 화살표 마커
  const defs=document.createElementNS('http://www.w3.org/2000/svg','defs');
  defs.innerHTML=`<marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#bbb" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>`;
  svg.appendChild(defs);

  // 엣지 먼저
  edges.forEach(e=>{
    const line=document.createElementNS('http://www.w3.org/2000/svg','line');
    line.setAttribute('x1',e.from.x); line.setAttribute('y1',e.from.y);
    line.setAttribute('x2',e.to.x); line.setAttribute('y2',e.to.y);
    line.setAttribute('stroke','#ccc');
    line.setAttribute('stroke-width',e.thin?'0.5':'1');
    if(e.dash) line.setAttribute('stroke-dasharray','4,3');
    if(!e.dash) line.setAttribute('marker-end','url(#arr)');
    svg.appendChild(line);
  });

  // 노드
  nodes.forEach(n=>{
    const c=nodeColor(n);
    const tc=nodeTextColor(n);
    const g=document.createElementNS('http://www.w3.org/2000/svg','g');
    g.style.cursor='pointer';
    g.addEventListener('click',()=>showInfo(n));

    const rect=document.createElementNS('http://www.w3.org/2000/svg','rect');
    rect.setAttribute('x',n.x); rect.setAttribute('y',n.y);
    rect.setAttribute('width',W); rect.setAttribute('height',H);
    rect.setAttribute('rx','8');
    rect.setAttribute('fill',c.fill);
    rect.setAttribute('stroke',c.stroke);
    rect.setAttribute('stroke-width',n.focus?'2':'1');
    g.appendChild(rect);

    // 이름/코드
    const label=n.type==='parent'?n.data.name:n.data.code;
    const text1=document.createElementNS('http://www.w3.org/2000/svg','text');
    text1.setAttribute('x',n.x+W/2); text1.setAttribute('y',n.y+18);
    text1.setAttribute('text-anchor','middle');
    text1.setAttribute('font-size','12'); text1.setAttribute('font-weight','600');
    text1.setAttribute('fill',tc); text1.setAttribute('font-family','inherit');
    text1.textContent=label.length>14?label.slice(0,13)+'…':label;
    g.appendChild(text1);

    // 모프
    const morph=n.data.morph||'';
    const text2=document.createElementNS('http://www.w3.org/2000/svg','text');
    text2.setAttribute('x',n.x+W/2); text2.setAttribute('y',n.y+32);
    text2.setAttribute('text-anchor','middle');
    text2.setAttribute('font-size','10'); text2.setAttribute('fill',tc);
    text2.setAttribute('font-family','inherit'); text2.setAttribute('opacity','0.8');
    text2.textContent=morph.length>16?morph.slice(0,15)+'…':morph;
    g.appendChild(text2);

    // 성별/브리더
    const sub=n.type==='parent'
      ?(n.data.gender?n.data.gender+' · ':'')+n.data.owner_label
      :n.data.owner_label||'';
    const text3=document.createElementNS('http://www.w3.org/2000/svg','text');
    text3.setAttribute('x',n.x+W/2); text3.setAttribute('y',n.y+46);
    text3.setAttribute('text-anchor','middle');
    text3.setAttribute('font-size','9'); text3.setAttribute('fill',tc);
    text3.setAttribute('font-family','inherit'); text3.setAttribute('opacity','0.6');
    text3.textContent=sub.length>20?sub.slice(0,19)+'…':sub;
    g.appendChild(text3);

    svg.appendChild(g);
  });

  wrap.innerHTML='';
  wrap.appendChild(svg);
}

function showInfo(n){
  const el=document.getElementById('infoPanel');
  const d=n.data;
  if(n.type==='parent'){
    el.innerHTML=`
      <div class="info-name">${d.name}</div>
      <div class="info-meta">
        ${d.code?`코드: ${d.code}<br>`:''}
        ${d.morph?`모프: ${d.morph}<br>`:''}
        ${d.gender?`성별: ${d.gender}<br>`:''}
        브리더: ${d.owner_label||''}
      </div>
      <span class="info-link" onclick="location.href='/?id=${d.id}&type=parent'">← 부모 개체 가계도 보기</span>`;
  } else {
    const dad=allAnimals.find(a=>a.id===d.father_id);
    const mom=allAnimals.find(a=>a.id===d.mother_id);
    const date=d.hatch_date?new Date(d.hatch_date).toLocaleDateString('ko-KR'):'';
    el.innerHTML=`
      <div class="info-name" style="font-size:14px;font-family:monospace">${d.code}</div>
      <div class="info-meta">
        ${d.morph?`모프: ${d.morph}<br>`:''}
        ${d.gender?`성별: ${d.gender}<br>`:''}
        ${date?`해칭일: ${date}<br>`:''}
        ${dad?`부: ${dad.name}<br>`:''}
        ${mom?`모: ${mom.name}<br>`:''}
        브리더: ${d.owner_label||''}
      </div>
      <span class="info-link" onclick="location.href='/genealogy.html?id=${d.id}&type=hatch'">이 개체 기준 가계도 보기</span>`;
  }
}

function goBack(){
  if(document.referrer) history.back();
  else location.href='/';
}

init();
</script>
</body>
</html>
