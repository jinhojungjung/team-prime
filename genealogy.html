<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#ffffff">
<title>가계도 — TEAM.PRIME</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#fff;display:flex;justify-content:center}
.app{width:100%;max-width:430px;background:#fff;min-height:100vh;display:flex;flex-direction:column}
.header{padding:16px;border-bottom:1px solid #000;display:flex;align-items:center;gap:12px;position:sticky;top:0;background:#fff;z-index:10}
.back-btn{background:none;border:none;cursor:pointer;font-size:20px;color:#000;padding:0;line-height:1}
.header-title{font-size:16px;font-weight:700;color:#000}
.header-sub{font-size:11px;color:#888;margin-top:1px}
.legend{display:flex;gap:12px;padding:10px 16px;border-bottom:1px solid #eee;flex-wrap:wrap}
.leg{display:flex;align-items:center;gap:5px;font-size:11px;color:#666}
.leg-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.canvas-wrap{overflow:auto;flex:1;padding:20px 12px}
.info-panel{border-top:1px solid #000;padding:14px 16px;background:#fff;min-height:72px}
.info-name{font-size:15px;font-weight:700;color:#000;margin-bottom:3px}
.info-meta{font-size:12px;color:#888;line-height:1.6}
.info-link{display:inline-block;margin-top:6px;font-size:12px;color:#000;text-decoration:underline;cursor:pointer}
.loading{text-align:center;padding:60px;color:#bbb;font-size:14px}
.empty{text-align:center;padding:60px 20px;color:#bbb;font-size:14px}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <button class="back-btn" onclick="goBack()">←</button>
    <div>
      <div class="header-title" id="headerTitle">가계도</div>
      <div class="header-sub">TEAM.PRIME</div>
    </div>
  </div>
  <div class="legend">
    <div class="leg"><div class="leg-dot" style="background:#4a7cf7"></div>수컷</div>
    <div class="leg"><div class="leg-dot" style="background:#e06faa"></div>암컷</div>
    <div class="leg"><div class="leg-dot" style="background:#888"></div>해칭</div>
    <div class="leg"><div class="leg-dot" style="background:#f5a623;border-radius:2px"></div>기준 개체</div>
  </div>
  <div class="canvas-wrap" id="canvasWrap">
    <div class="loading">가계도 불러오는 중...</div>
  </div>
  <div class="info-panel" id="infoPanel">
    <div style="color:#bbb;font-size:13px">노드를 탭해서 정보를 확인하세요</div>
  </div>
</div>

<script>
const SB='https://yoiytrwuojrgvjwsywlt.supabase.co';
const KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlvaXl0cnd1b2pyZ3Zqd3N5d2x0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk3Nzk2OTMsImV4cCI6MjA5NTM1NTY5M30.6Yvi5REKQmsjYBhwcHiwZUwfzFPA1bvVimPjSF1J0hs';

let allAnimals=[], allHatchlings=[], focusId=null, focusType=null;

async function get(path){
  const r=await fetch(SB+'/rest/v1/'+path,{headers:{'apikey':KEY,'Authorization':'Bearer '+KEY}});
  return r.json();
}

async function init(){
  const params=new URLSearchParams(location.search);
  focusId=params.get('id');
  focusType=params.get('type')||'parent';
  const [a,h]=await Promise.all([
    get('animals?select=id,name,code,morph,gender,owner_label&order=name.asc'),
    get('hatchlings?select=id,code,morph,gender,father_id,mother_id,owner_label,hatch_date&order=hatch_date.asc')
  ]);
  allAnimals=a; allHatchlings=h;
  if(!focusId){ document.getElementById('canvasWrap').innerHTML='<div class="empty">개체 정보가 없습니다</div>'; return; }
  const focus=focusType==='parent'?allAnimals.find(x=>x.id===focusId):allHatchlings.find(x=>x.id===focusId);
  if(!focus){ document.getElementById('canvasWrap').innerHTML='<div class="empty">개체를 찾을 수 없습니다</div>'; return; }
  document.getElementById('headerTitle').textContent=focusType==='parent'?focus.name:focus.code;
  buildTree(focus);
}

function nodeColor(type, gender, isFocus){
  if(isFocus) return {fill:'#fff7e6',stroke:'#f5a623',sw:2.5,tc:'#a06000'};
  if(type==='hatch') return {fill:'#f5f5f5',stroke:'#999',sw:1,tc:'#444'};
  if(gender==='수컷') return {fill:'#e8f0fe',stroke:'#4a7cf7',sw:1,tc:'#2a5cd4'};
  if(gender==='암컷') return {fill:'#fce8f3',stroke:'#e06faa',sw:1,tc:'#c0427e'};
  return {fill:'#f5f5f5',stroke:'#999',sw:1,tc:'#444'};
}

function makeNode(svg, x, y, w, h, data, type, isFocus){
  const c=nodeColor(type, data.gender, isFocus);
  const g=document.createElementNS('http://www.w3.org/2000/svg','g');
  g.style.cursor='pointer';
  g.addEventListener('click',()=>showInfo(data,type,isFocus));

  const rect=document.createElementNS('http://www.w3.org/2000/svg','rect');
  rect.setAttribute('x',x); rect.setAttribute('y',y);
  rect.setAttribute('width',w); rect.setAttribute('height',h);
  rect.setAttribute('rx','10'); rect.setAttribute('fill',c.fill);
  rect.setAttribute('stroke',c.stroke); rect.setAttribute('stroke-width',c.sw);
  g.appendChild(rect);

  const label=type==='parent'?data.name:data.code;
  const morph=data.morph||'';
  const sub=type==='parent'?(data.gender?data.gender+' · ':'')+data.owner_label:data.owner_label||'';

  const addText=(txt,dy,size,weight,opacity)=>{
    if(!txt) return;
    const t=document.createElementNS('http://www.w3.org/2000/svg','text');
    t.setAttribute('x',x+w/2); t.setAttribute('y',y+dy);
    t.setAttribute('text-anchor','middle'); t.setAttribute('font-size',size);
    t.setAttribute('font-weight',weight); t.setAttribute('fill',c.tc);
    t.setAttribute('font-family','inherit'); t.setAttribute('opacity',opacity||'1');
    const maxLen=Math.floor(w/size*1.8);
    t.textContent=txt.length>maxLen?txt.slice(0,maxLen-1)+'…':txt;
    g.appendChild(t);
  };

  addText(label, 18, 13, '600', '1');
  addText(morph, 32, 11, '400', '0.85');
  addText(sub, 46, 10, '400', '0.65');
  svg.appendChild(g);
  return {x,y,w,h,cx:x+w/2,cy:y+h/2};
}

function makeLine(svg, x1, y1, x2, y2, dash){
  const line=document.createElementNS('http://www.w3.org/2000/svg','line');
  line.setAttribute('x1',x1); line.setAttribute('y1',y1);
  line.setAttribute('x2',x2); line.setAttribute('y2',y2);
  line.setAttribute('stroke','#ccc'); line.setAttribute('stroke-width','1');
  if(dash) line.setAttribute('stroke-dasharray','4,3');
  svg.insertBefore(line, svg.firstChild);
}

function makePath(svg, x1, y1, x2, y2){
  const mid=(y1+y2)/2;
  const p=document.createElementNS('http://www.w3.org/2000/svg','path');
  p.setAttribute('d','M'+x1+' '+y1+' L'+x1+' '+mid+' L'+x2+' '+mid+' L'+x2+' '+y2);
  p.setAttribute('fill','none'); p.setAttribute('stroke','#ccc'); p.setAttribute('stroke-width','1');
  svg.insertBefore(p, svg.firstChild);
}

function buildTree(focus){
  const W=150, H=56, HGAP=12, VGAP=60;

  if(focusType==='parent'){
    // 기준 개체가 포함된 커플(부모쌍) 찾기
    // 기준이 수컷이면 → 파트너(암컷)들과 묶기
    // 기준이 암컷이면 → 파트너(수컷)들과 묶기

    // 기준 개체가 속한 해칭들 찾기
    const myHatchlings=allHatchlings.filter(h=>h.father_id===focus.id||h.mother_id===focus.id);

    // 커플 그룹핑: {partner, kids[]}
    const coupleMap={};
    myHatchlings.forEach(h=>{
      const partnerId=h.father_id===focus.id?h.mother_id:h.father_id;
      const key=partnerId||'none';
      if(!coupleMap[key]) coupleMap[key]={partnerId,kids:[]};
      coupleMap[key].kids.push(h);
    });
    const couples=Object.values(coupleMap);

    // 레이아웃
    // 각 커플의 너비 = max(kids수, 1) * (W+HGAP)
    const coupleWidths=couples.map(c=>Math.max(c.kids.length,1)*(W+HGAP));
    const totalW=Math.max(coupleWidths.reduce((a,b)=>a+b,0)+HGAP*2, W*2+HGAP*3);
    const svgW=Math.max(totalW, 360);
    const svgH=couples.length>0?220:130;

    const svg=createSVG(svgW, svgH+(couples.some(c=>c.kids.length>0)?0:0));

    // 기준 개체는 중앙 상단
    const focusX=svgW/2-W/2;
    const focusY=20;
    makeNode(svg, focusX, focusY, W, H, focus, 'parent', true);

    // 각 커플 처리
    let coupleOffsetX=HGAP;
    couples.forEach((couple,ci)=>{
      const cw=coupleWidths[ci];
      const coupleCenter=coupleOffsetX+cw/2;

      // 파트너 노드
      const partner=couple.partnerId?allAnimals.find(a=>a.id===couple.partnerId):null;
      const partnerY=focusY;

      if(partner){
        // 파트너를 기준 개체 옆에 배치
        // 기준이 왼쪽/오른쪽 중 coupleCenter 기준
        const partnerX=coupleCenter-W/2;

        // 기준 개체와 파트너를 수평선으로 연결
        const focusCX=focusX+W/2;
        const partnerCX=partnerX+W/2;
        const lineY=focusY+H/2;

        // 중간 연결선
        makeLine(svg, focusCX, lineY, partnerCX, lineY, true);
        makeNode(svg, partnerX, partnerY, W, H, partner, 'parent', false);

        // 커플 중심점
        const midCX=(focusCX+partnerCX)/2;
        const kidY=focusY+H+VGAP;

        // 커플 중심에서 아래로 수직선
        if(couple.kids.length>0){
          makeLine(svg, midCX, lineY, midCX, kidY, false);
        }

        // 해칭들
        const totalKidsW=couple.kids.length*(W+HGAP)-HGAP;
        couple.kids.forEach((h,i)=>{
          const kx=midCX-totalKidsW/2+i*(W+HGAP);
          makeNode(svg, kx, kidY, W, H, h, 'hatch', false);
          makePath(svg, midCX, kidY, kx+W/2, kidY);
        });

      } else {
        // 파트너 없는 경우
        const kidY=focusY+H+VGAP;
        const focusCX=focusX+W/2;
        if(couple.kids.length>0){
          makeLine(svg, focusCX, focusY+H, focusCX, kidY, false);
        }
        const totalKidsW=couple.kids.length*(W+HGAP)-HGAP;
        couple.kids.forEach((h,i)=>{
          const kx=focusCX-totalKidsW/2+i*(W+HGAP);
          makeNode(svg, kx, kidY, W, H, h, 'hatch', false);
          makePath(svg, focusCX, kidY, kx+W/2, kidY);
        });
      }
      coupleOffsetX+=cw;
    });

    // SVG 높이 재조정
    const hasKids=couples.some(c=>c.kids.length>0);
    const finalH=hasKids?focusY+H+VGAP+H+30:focusY+H+30;
    svg.setAttribute('height',finalH);
    svg.setAttribute('viewBox','0 0 '+svgW+' '+finalH);
    document.getElementById('canvasWrap').innerHTML='';
    document.getElementById('canvasWrap').appendChild(svg);

  } else {
    // 해칭 기준: 부모쌍이 위에, 해칭이 아래
    const h=focus;
    const father=allAnimals.find(a=>a.id===h.father_id);
    const mother=allAnimals.find(a=>a.id===h.mother_id);

    const svgW=380;
    const focusX=svgW/2-W/2;
    const parentY=20;
    const focusY=parentY+H+VGAP;

    const svg=createSVG(svgW, focusY+H+30);

    // 부모 쌍
    if(father&&mother){
      const fatherX=svgW/2-W-HGAP/2;
      const motherX=svgW/2+HGAP/2;
      const lineY=parentY+H/2;
      const midCX=svgW/2;

      makeNode(svg, fatherX, parentY, W, H, father, 'parent', false);
      makeNode(svg, motherX, parentY, W, H, mother, 'parent', false);

      // 부모 연결선
      makeLine(svg, fatherX+W, lineY, motherX, lineY, true);
      // 중심에서 아래로
      makeLine(svg, midCX, lineY, midCX, focusY, false);

    } else if(father){
      const fatherX=svgW/2-W/2;
      makeNode(svg, fatherX, parentY, W, H, father, 'parent', false);
      makeLine(svg, svgW/2, parentY+H, svgW/2, focusY, false);
    } else if(mother){
      const motherX=svgW/2-W/2;
      makeNode(svg, motherX, parentY, W, H, mother, 'parent', false);
      makeLine(svg, svgW/2, parentY+H, svgW/2, focusY, false);
    }

    // 기준 해칭
    makeNode(svg, focusX, focusY, W, H, h, 'hatch', true);

    // 해칭의 자식들
    const kids=allHatchlings.filter(g=>g.father_id===h.id||g.mother_id===h.id);
    if(kids.length>0){
      const kidY=focusY+H+VGAP;
      const totalKidsW=kids.length*(W+HGAP)-HGAP;
      const kidsStartX=svgW/2-totalKidsW/2;
      svg.setAttribute('height', kidY+H+30);
      svg.setAttribute('viewBox','0 0 '+svgW+' '+(kidY+H+30));
      makeLine(svg, svgW/2, focusY+H, svgW/2, kidY, false);
      kids.forEach((k,i)=>{
        const kx=kidsStartX+i*(W+HGAP);
        makeNode(svg, kx, kidY, W, H, k, 'hatch', false);
        makePath(svg, svgW/2, kidY, kx+W/2, kidY);
      });
    }

    document.getElementById('canvasWrap').innerHTML='';
    document.getElementById('canvasWrap').appendChild(svg);
  }
}

function createSVG(w,h){
  const svg=document.createElementNS('http://www.w3.org/2000/svg','svg');
  svg.setAttribute('width',w); svg.setAttribute('height',h);
  svg.setAttribute('viewBox','0 0 '+w+' '+h);
  svg.style.display='block'; svg.style.margin='0 auto';
  // 화살표 마커
  const defs=document.createElementNS('http://www.w3.org/2000/svg','defs');
  defs.innerHTML='<marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#bbb" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>';
  svg.appendChild(defs);
  return svg;
}

function showInfo(data, type, isFocus){
  const el=document.getElementById('infoPanel');
  if(type==='parent'){
    const kids=allHatchlings.filter(h=>h.father_id===data.id||h.mother_id===data.id);
    el.innerHTML='<div class="info-name">'+data.name+'</div>'+
      '<div class="info-meta">'+
      (data.code?'코드: '+data.code+'<br>':'')+
      (data.morph?'모프: '+data.morph+'<br>':'')+
      (data.gender?'성별: '+data.gender+'<br>':'')+
      '브리더: '+(data.owner_label||'')+
      (kids.length?'<br>해칭 개체: '+kids.length+'마리':'')+
      '</div>'+
      '<span class="info-link" onclick="location.href=\'/genealogy.html?id='+data.id+'&type=parent\'">이 개체 기준 가계도 →</span>';
  } else {
    const dad=allAnimals.find(a=>a.id===data.father_id);
    const mom=allAnimals.find(a=>a.id===data.mother_id);
    const date=data.hatch_date?new Date(data.hatch_date).toLocaleDateString('ko-KR'):'';
    el.innerHTML='<div class="info-name" style="font-family:monospace;font-size:13px">'+data.code+'</div>'+
      '<div class="info-meta">'+
      (data.morph?'모프: '+data.morph+'<br>':'')+
      (data.gender?'성별: '+data.gender+'<br>':'')+
      (date?'해칭일: '+date+'<br>':'')+
      (dad?'부: '+dad.name+'<br>':'')+
      (mom?'모: '+mom.name+'<br>':'')+
      '브리더: '+(data.owner_label||'')+
      '</div>'+
      '<span class="info-link" onclick="location.href=\'/genealogy.html?id='+data.id+'&type=hatch\'">이 개체 기준 가계도 →</span>';
  }
}

function goBack(){
  if(document.referrer&&document.referrer.includes(location.hostname)) history.back();
  else location.href='/';
}

init();
</script>
</body>
</html>
