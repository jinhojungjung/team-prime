<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#ffffff">
<title>가계도 — TEAM.PRIME</title>
<link rel="stylesheet" href="/style.css">
</head>
<body>
<div class="app">
  <div class="header">
    <button class="header-back" onclick="goBack()">←</button>
    <div>
      <div class="logo" id="headerTitle">가계도</div>
      <div class="sub">TEAM.PRIME</div>
    </div>
  </div>
  <div class="legend">
    <div class="leg"><div class="leg-dot" style="background:#4a7cf7"></div>수컷</div>
    <div class="leg"><div class="leg-dot" style="background:#e06faa"></div>암컷</div>
    <div class="leg"><div class="leg-dot" style="background:#888"></div>해칭</div>
    <div class="leg"><div class="leg-dot" style="background:#f5a623;border-radius:2px"></div>기준</div>
  </div>
  <div class="canvas-wrap" id="canvasWrap">
    <div class="loading">가계도 불러오는 중...</div>
  </div>
  <div class="info-panel" id="infoPanel">
    <div style="color:#bbb;font-size:13px">노드를 탭해서 정보를 확인하세요</div>
  </div>
</div>

<script>
const SB='https://yoiytrwuojrgvjwsywlt.supabase.co';
const KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlvaXl0cnd1b2pyZ3Zqd3N5d2x0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk3Nzk2OTMsImV4cCI6MjA5NTM1NTY5M30.6Yvi5REKQmsjYBhwcHiwZUwfzFPA1bvVimPjSF1J0hs';

let allAnimals=[], allHatchlings=[], focusId=null, focusType=null;

const NW=160, NH=58, HGAP=16, VGAP=70;

async function get(path){
  const r=await fetch(SB+'/rest/v1/'+path,{headers:{'apikey':KEY,'Authorization':'Bearer '+KEY}});
  return r.json();
}

async function init(){
  const p=new URLSearchParams(location.search);
  focusId=p.get('id'); focusType=p.get('type')||'parent';
  const [a,h]=await Promise.all([
    get('animals?select=id,name,code,morph,gender,owner_label&order=name.asc'),
    get('hatchlings?select=id,code,morph,gender,father_id,mother_id,owner_label,hatch_date&order=hatch_date.asc')
  ]);
  allAnimals=a; allHatchlings=h;
  if(!focusId){ show('<div class="empty">개체 정보가 없습니다</div>'); return; }
  const focus=focusType==='parent'?allAnimals.find(x=>x.id===focusId):allHatchlings.find(x=>x.id===focusId);
  if(!focus){ show('<div class="empty">개체를 찾을 수 없습니다</div>'); return; }
  document.getElementById('headerTitle').textContent=focusType==='parent'?focus.name:focus.code;
  buildTree(focus);
}

function show(html){ document.getElementById('canvasWrap').innerHTML=html; }

function nc(type, gender, isFocus){
  if(isFocus) return {fill:'#fff7e6',stroke:'#f5a623',sw:2.5,tc:'#a06000'};
  if(type==='hatch') return {fill:'#f5f5f5',stroke:'#999',sw:1,tc:'#444'};
  if(gender==='수컷') return {fill:'#e8f0fe',stroke:'#4a7cf7',sw:1,tc:'#2a5cd4'};
  if(gender==='암컷') return {fill:'#fce8f3',stroke:'#e06faa',sw:1,tc:'#c0427e'};
  return {fill:'#f5f5f5',stroke:'#999',sw:1,tc:'#444'};
}

function addNode(svg, x, y, data, type, isFocus){
  const c=nc(type, data.gender, isFocus);
  const g=document.createElementNS('http://www.w3.org/2000/svg','g');
  g.style.cursor='pointer';
  g.addEventListener('click',()=>showInfo(data,type));

  const rect=document.createElementNS('http://www.w3.org/2000/svg','rect');
  rect.setAttribute('x',x); rect.setAttribute('y',y);
  rect.setAttribute('width',NW); rect.setAttribute('height',NH);
  rect.setAttribute('rx','10'); rect.setAttribute('fill',c.fill);
  rect.setAttribute('stroke',c.stroke); rect.setAttribute('stroke-width',c.sw);
  g.appendChild(rect);

  const label=type==='parent'?data.name:data.code;
  const morph=data.morph||'';
  const sub=type==='parent'?(data.gender?data.gender+' · ':'')+data.owner_label:data.owner_label||'';

  const t=(txt,dy,sz,fw,op)=>{
    if(!txt) return;
    const el=document.createElementNS('http://www.w3.org/2000/svg','text');
    el.setAttribute('x',x+NW/2); el.setAttribute('y',y+dy);
    el.setAttribute('text-anchor','middle'); el.setAttribute('font-size',sz);
    el.setAttribute('font-weight',fw); el.setAttribute('fill',c.tc);
    el.setAttribute('font-family','inherit'); el.setAttribute('opacity',op);
    const max=Math.floor(NW/sz*1.7);
    el.textContent=txt.length>max?txt.slice(0,max-1)+'…':txt;
    g.appendChild(el);
  };
  t(label,20,13,'700','1');
  t(morph,35,11,'400','0.85');
  t(sub,49,10,'400','0.65');
  svg.appendChild(g);
}

function addLine(svg,x1,y1,x2,y2,dash){
  const l=document.createElementNS('http://www.w3.org/2000/svg','line');
  l.setAttribute('x1',x1);l.setAttribute('y1',y1);l.setAttribute('x2',x2);l.setAttribute('y2',y2);
  l.setAttribute('stroke','#ccc');l.setAttribute('stroke-width','1.5');
  if(dash) l.setAttribute('stroke-dasharray','5,4');
  svg.insertBefore(l,svg.firstChild.nextSibling);
}

function addElbow(svg,fromX,fromY,toX,toY){
  const mid=(fromY+toY)/2;
  const p=document.createElementNS('http://www.w3.org/2000/svg','path');
  p.setAttribute('d','M'+fromX+' '+fromY+' L'+fromX+' '+mid+' L'+toX+' '+mid+' L'+toX+' '+toY);
  p.setAttribute('fill','none');p.setAttribute('stroke','#ccc');p.setAttribute('stroke-width','1.5');
  svg.insertBefore(p,svg.firstChild.nextSibling);
}

function mkSVG(w,h){
  const svg=document.createElementNS('http://www.w3.org/2000/svg','svg');
  svg.setAttribute('width',w); svg.setAttribute('height',h);
  svg.setAttribute('viewBox','0 0 '+w+' '+h);
  svg.style.display='block'; svg.style.margin='0 auto';
  const defs=document.createElementNS('http://www.w3.org/2000/svg','defs');
  svg.appendChild(defs);
  return svg;
}

function buildTree(focus){
  if(focusType==='parent'){
    buildParentTree(focus);
  } else {
    buildHatchTree(focus);
  }
}

function buildParentTree(focus){
  // 커플 그룹핑
  const myHatchlings=allHatchlings.filter(h=>h.father_id===focus.id||h.mother_id===focus.id);
  const coupleMap={};
  myHatchlings.forEach(h=>{
    const pid=h.father_id===focus.id?h.mother_id:h.father_id;
    const key=pid||'none';
    if(!coupleMap[key]) coupleMap[key]={pid,kids:[]};
    coupleMap[key].kids.push(h);
  });
  const couples=Object.values(coupleMap);

  // 커플 없으면 단독
  if(!couples.length){
    const svgW=NW+40;
    const svgH=NH+40;
    const svg=mkSVG(svgW,svgH);
    addNode(svg,20,20,focus,'parent',true);
    mount(svg); return;
  }

  // 전체 레이아웃 계산
  // 각 커플 블록 너비: partner노드 + 기준노드 + 해칭들
  // 기준 개체는 커플마다 공유 → 가운데 고정
  // 레이아웃: [partner1] [FOCUS] [partner2] ...
  // 해칭은 각 파트너-기준 중점 아래

  const COUPLE_GAP=40; // 커플 간 간격

  // 파트너 목록
  const partners=couples.map(c=>c.pid?allAnimals.find(a=>a.id===c.pid):null);

  // 기준 개체 가운데 고정
  // 전체 너비: 왼쪽파트너들 + 기준 + 오른쪽파트너들
  const leftCount=Math.floor(couples.length/2);
  const rightCount=couples.length-leftCount;

  // 각 파트너 위치 계산
  // 기준 개체 X
  const focusX=(leftCount*(NW+COUPLE_GAP));
  const totalTopW=focusX+NW+(rightCount*(NW+COUPLE_GAP));
  const svgW=Math.max(totalTopW+20, couples.reduce((a,c)=>a+Math.max(c.kids.length,1)*(NW+HGAP),0)+40);

  // 실제 SVG 너비: 위 행(파트너+기준) vs 아래 행(해칭들) 중 큰 것
  const kidsTotalW=couples.reduce((acc,c)=>acc+Math.max(c.kids.length,1)*(NW+HGAP),0)+COUPLE_GAP*(couples.length-1);
  const finalW=Math.max(svgW, kidsTotalW+40);

  // Y positions
  const row1Y=20;
  const row2Y=row1Y+NH+VGAP;
  const hasKids=myHatchlings.length>0;
  const finalH=hasKids?row2Y+NH+30:row1Y+NH+30;

  const svg=mkSVG(finalW, finalH);

  // 기준 개체 위치 (중앙)
  const focusCX=finalW/2;
  const focusDrawX=focusCX-NW/2;
  addNode(svg, focusDrawX, row1Y, focus, 'parent', true);

  // 해칭 전체 너비 계산해서 균등 배치
  let kidsOffset=20;
  couples.forEach((couple,ci)=>{
    const partner=couple.pid?allAnimals.find(a=>a.id===couple.pid):null;
    const kidsCount=Math.max(couple.kids.length,0);
    const coupleKidsW=kidsCount*(NW+HGAP)-HGAP;

    // 파트너 위치: 기준 개체 왼쪽/오른쪽 번갈아
    let partnerX;
    if(ci%2===0){
      // 왼쪽
      partnerX=focusDrawX-(NW+COUPLE_GAP)*(Math.floor(ci/2)+1);
    } else {
      // 오른쪽
      partnerX=focusDrawX+(NW+COUPLE_GAP)*(Math.floor(ci/2)+1);
    }

    if(partner){
      addNode(svg, partnerX, row1Y, partner, 'parent', false);
      const partnerCX=partnerX+NW/2;
      const lineY=row1Y+NH/2;
      // 파트너 ─── 기준 수평 연결선
      const leftX=Math.min(partnerCX,focusCX);
      const rightX=Math.max(partnerCX,focusCX);
      addLine(svg, leftX, lineY, rightX, lineY, true);
      // 중점에서 아래로
      const midX=(partnerCX+focusCX)/2;
      if(couple.kids.length>0){
        addLine(svg, midX, lineY, midX, row2Y, false);
        // 해칭들
        const kidsStartX=midX-coupleKidsW/2;
        couple.kids.forEach((h,i)=>{
          const kx=kidsStartX+i*(NW+HGAP);
          addNode(svg, kx, row2Y, h, 'hatch', false);
          if(couple.kids.length>1){
            addElbow(svg, midX, row2Y, kx+NW/2, row2Y);
          }
        });
      }
    } else {
      // 파트너 없음 → 기준에서 바로 아래
      if(couple.kids.length>0){
        addLine(svg, focusCX, row1Y+NH, focusCX, row2Y, false);
        const kidsStartX=focusCX-coupleKidsW/2;
        couple.kids.forEach((h,i)=>{
          const kx=kidsStartX+i*(NW+HGAP);
          addNode(svg, kx, row2Y, h, 'hatch', false);
          if(couple.kids.length>1){
            addElbow(svg, focusCX, row2Y, kx+NW/2, row2Y);
          }
        });
      }
    }
    kidsOffset+=coupleKidsW+COUPLE_GAP;
  });

  mount(svg);
}

function buildHatchTree(focus){
  const h=focus;
  const father=allAnimals.find(a=>a.id===h.father_id);
  const mother=allAnimals.find(a=>a.id===h.mother_id);

  // 자식들
  const kids=allHatchlings.filter(g=>g.father_id===h.id||g.mother_id===h.id);

  const hasBothParents=father&&mother;
  const hasOneParent=father||mother;

  // 너비 계산
  const parentRowW=hasBothParents?NW*2+HGAP*4:NW+40;
  const kidsRowW=kids.length>0?kids.length*(NW+HGAP)-HGAP:0;
  const finalW=Math.max(parentRowW, kidsRowW, NW)+80;

  const row1Y=20;
  const row2Y=row1Y+NH+VGAP;
  const row3Y=row2Y+NH+VGAP;
  const hasKids=kids.length>0;
  const finalH=hasKids?row3Y+NH+30:row2Y+NH+30;

  const svg=mkSVG(finalW, finalH);
  const cx=finalW/2;

  if(hasBothParents){
    // 부 왼쪽, 모 오른쪽 균등 배치
    const fatherX=cx-NW-HGAP*2;
    const motherX=cx+HGAP*2;
    addNode(svg, fatherX, row1Y, father, 'parent', false);
    addNode(svg, motherX, row1Y, mother, 'parent', false);
    const lineY=row1Y+NH/2;
    // 부모 연결선
    addLine(svg, fatherX+NW, lineY, motherX, lineY, true);
    // 중점 → 아래
    addLine(svg, cx, lineY, cx, row2Y, false);
  } else if(father){
    addNode(svg, cx-NW/2, row1Y, father, 'parent', false);
    addLine(svg, cx, row1Y+NH, cx, row2Y, false);
  } else if(mother){
    addNode(svg, cx-NW/2, row1Y, mother, 'parent', false);
    addLine(svg, cx, row1Y+NH, cx, row2Y, false);
  }

  // 기준 해칭
  addNode(svg, cx-NW/2, row2Y, h, 'hatch', true);

  // 자식들
  if(hasKids){
    addLine(svg, cx, row2Y+NH, cx, row3Y, false);
    const kidsW=kids.length*(NW+HGAP)-HGAP;
    const kidsStartX=cx-kidsW/2;
    kids.forEach((k,i)=>{
      const kx=kidsStartX+i*(NW+HGAP);
      addNode(svg, kx, row3Y, k, 'hatch', false);
      if(kids.length>1) addElbow(svg, cx, row3Y, kx+NW/2, row3Y);
    });
  }

  mount(svg);
}

function mount(svg){
  const wrap=document.getElementById('canvasWrap');
  wrap.innerHTML='';
  wrap.appendChild(svg);
}

function showInfo(data, type){
  const el=document.getElementById('infoPanel');
  if(type==='parent'){
    const kids=allHatchlings.filter(h=>h.father_id===data.id||h.mother_id===data.id);
    el.innerHTML='<div class="info-panel-name">'+data.name+'</div>'+
      '<div class="info-panel-meta">'+
      (data.code?'코드: '+data.code+'<br>':'')+
      (data.morph?'모프: '+data.morph+'<br>':'')+
      (data.gender?'성별: '+data.gender+'<br>':'')+
      '브리더: '+(data.owner_label||'')+
      (kids.length?'<br>해칭 개체: '+kids.length+'마리':'')+
      '</div>'+
      '<span class="info-link" onclick="location.href=\'/genealogy.html?id='+data.id+'&type=parent\'">이 개체 기준 가계도 →</span>';
  } else {
    const dad=allAnimals.find(a=>a.id===data.father_id);
    const mom=allAnimals.find(a=>a.id===data.mother_id);
    const date=data.hatch_date?new Date(data.hatch_date).toLocaleDateString('ko-KR'):'';
    el.innerHTML='<div class="info-panel-name" style="font-family:monospace;font-size:13px">'+data.code+'</div>'+
      '<div class="info-panel-meta">'+
      (data.morph?'모프: '+data.morph+'<br>':'')+
      (data.gender?'성별: '+data.gender+'<br>':'')+
      (date?'해칭일: '+date+'<br>':'')+
      (dad?'부: '+dad.name+'<br>':'')+
      (mom?'모: '+mom.name+'<br>':'')+
      '브리더: '+(data.owner_label||'')+
      '</div>'+
      '<span class="info-link" onclick="location.href=\'/genealogy.html?id='+data.id+'&type=hatch\'">이 개체 기준 가계도 →</span>';
  }
}

function goBack(){
  if(document.referrer&&document.referrer.includes(location.hostname)) history.back();
  else location.href='/';
}

init();
</script>
</body>
</html>
