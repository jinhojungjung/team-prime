<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#ffffff">
<title>TEAM.PRIME</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#fff;display:flex;justify-content:center}
.app{width:100%;max-width:680px;background:#fff;min-height:100vh}

.header{padding:16px 16px 12px;border-bottom:1px solid #000;display:flex;align-items:center;gap:12px;position:sticky;top:0;background:#fff;z-index:10}
.back-btn{background:none;border:none;cursor:pointer;font-size:20px;color:#000;padding:0;display:flex;align-items:center}
.header-logo{font-size:16px;font-weight:700;letter-spacing:0.08em;color:#000}

.post-wrap{padding:28px 20px 60px}
.post-cat{font-size:11px;padding:3px 10px;border:1px solid #000;color:#000;font-weight:700;letter-spacing:0.04em;display:inline-block;margin-bottom:14px}
.post-title{font-size:26px;font-weight:800;color:#000;line-height:1.3;margin-bottom:12px;letter-spacing:-0.01em}
.post-meta{font-size:13px;color:#aaa;padding-bottom:18px;border-bottom:1px solid #eee;margin-bottom:24px;display:flex;gap:10px;align-items:center}
.post-meta span{color:#888;font-weight:500}

.post-content{font-size:15px;color:#222;line-height:1.85}
.post-content h1{font-size:22px;font-weight:800;margin:28px 0 12px;color:#000}
.post-content h2{font-size:18px;font-weight:700;margin:22px 0 10px;color:#000}
.post-content p{margin-bottom:14px}
.post-content strong{font-weight:700}
.post-content em{font-style:italic}
.post-content u{text-decoration:underline}
.post-content ul{padding-left:20px;margin-bottom:14px}
.post-content ol{padding-left:20px;margin-bottom:14px}
.post-content li{margin-bottom:6px}
.post-content a{color:#000;text-decoration:underline}
.post-content img{width:100%;border-radius:0;margin:14px 0;display:block;border:1px solid #eee}
.post-content blockquote{border-left:3px solid #000;padding:10px 16px;margin:16px 0;color:#555;background:#f9f9f9}

.loading{text-align:center;padding:60px;color:#bbb;font-size:14px}
.error{text-align:center;padding:60px 20px;color:#aaa;font-size:14px}

.back-footer{padding:20px;border-top:1px solid #eee;margin-top:20px}
.back-footer button{width:100%;padding:12px;font-size:14px;cursor:pointer;font-family:inherit;font-weight:600;background:#fff;border:1px solid #000;color:#000}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <button class="back-btn" onclick="goBack()">←</button>
    <div class="header-logo">TEAM.PRIME</div>
  </div>
  <div id="postWrap">
    <div class="loading">불러오는 중...</div>
  </div>
</div>
<script>
const SB='https://yoiytrwuojrgvjwsywlt.supabase.co';
const KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlvaXl0cnd1b2pyZ3Zqd3N5d2x0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk3Nzk2OTMsImV4cCI6MjA5NTM1NTY5M30.6Yvi5REKQmsjYBhwcHiwZUwfzFPA1bvVimPjSF1J0hs';

async function init(){
  const id=new URLSearchParams(location.search).get('id');
  if(!id){showError();return;}
  try{
    const r=await fetch(`${SB}/rest/v1/posts?id=eq.${id}&select=*`,{
      headers:{'apikey':KEY,'Authorization':'Bearer '+KEY}
    });
    const posts=await r.json();
    if(!posts.length){showError();return;}
    render(posts[0]);
  }catch(e){showError();}
}

function render(p){
  const date=new Date(p.created_at).toLocaleDateString('ko-KR',{year:'numeric',month:'long',day:'numeric'});
  document.title=`${p.title} — TEAM.PRIME`;
  document.getElementById('postWrap').innerHTML=`
    <div class="post-wrap">
      ${p.category?`<div class="post-cat">${p.category}</div>`:''}
      <div class="post-title">${p.title}</div>
      <div class="post-meta">
        <span>${p.author_label||''}</span>
        <span>·</span>
        <span>${date}</span>
      </div>
      <div class="post-content">${p.content}</div>
    </div>
    <div class="back-footer">
      <button onclick="goBack()">← 목록으로</button>
    </div>`;
}

function showError(){
  document.getElementById('postWrap').innerHTML='<div class="error">게시글을 찾을 수 없습니다.<br><br><a href="/" style="color:#000">← 홈으로</a></div>';
}

function goBack(){
  if(document.referrer&&document.referrer.includes(location.hostname)){
    history.back();
  } else {
    location.href='/';
  }
}

init();
</script>
</body>
</html>
