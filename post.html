<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0e0f11">
<title>TEAM.PRIME</title>
<meta name="description" content="크레스티드 게코 브리딩 카탈로그">
<!-- 링크 공유 미리보기 (Open Graph / Twitter) -->
<meta property="og:type" content="article">
<meta property="og:site_name" content="TEAM.PRIME">
<meta property="og:title" content="TEAM.PRIME">
<meta property="og:description" content="크레스티드 게코 브리딩 카탈로그">
<meta property="og:url" content="https://teamprime.site/post.html">
<meta property="og:image" content="https://teamprime.site/og-image.png">
<meta property="og:image:width" content="894">
<meta property="og:image:height" content="608">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="TEAM.PRIME">
<meta name="twitter:description" content="크레스티드 게코 브리딩 카탈로그">
<meta name="twitter:image" content="https://teamprime.site/og-image.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800;900&family=Archivo+Expanded:wght@600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<link rel="stylesheet" href="/style.css?v=2">
<style>.post-content img{width:100%!important;max-width:100%!important;height:auto!important;display:block;margin:18px 0;border:1px solid var(--line)}</style>
</head>
<body>
<div class="app">
  <div class="header">
    <button class="back-btn" onclick="goBack()">←</button>
    <div class="header-logo">TEAM.PRIME</div>
  </div>
  <div id="postWrap">
    <div class="loading">불러오는 중...</div>
  </div>
</div>
<script>
const SB='https://yoiytrwuojrgvjwsywlt.supabase.co';
const KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlvaXl0cnd1b2pyZ3Zqd3N5d2x0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk3Nzk2OTMsImV4cCI6MjA5NTM1NTY5M30.6Yvi5REKQmsjYBhwcHiwZUwfzFPA1bvVimPjSF1J0hs';

async function init(){
  const id=new URLSearchParams(location.search).get('id');
  if(!id){showError();return;}
  try{
    const r=await fetch(`${SB}/rest/v1/posts?id=eq.${id}&select=*`,{
      headers:{'apikey':KEY,'Authorization':'Bearer '+KEY}
    });
    const posts=await r.json();
    if(!posts.length){showError();return;}
    render(posts[0]);
  }catch(e){showError();}
}

function render(p){
  const date=new Date(p.created_at).toLocaleDateString('ko-KR',{year:'numeric',month:'long',day:'numeric'});
  document.title=`${p.title} — TEAM.PRIME`;
  document.getElementById('postWrap').innerHTML=`
    <div class="post-wrap">
      ${p.category?`<div class="post-page-cat">${p.category}</div>`:''}
      <div class="post-page-title">${p.title}</div>
      <div class="post-page-meta">
        <span>${p.author_label||''}</span>
        <span>·</span>
        <span>${date}</span>
      </div>
      <div class="post-content">${p.content}</div>
    </div>
    <div class="back-footer">
      <button onclick="goBack()">← 목록으로</button>
    </div>`;
}

function showError(){
  document.getElementById('postWrap').innerHTML='<div class="error">게시글을 찾을 수 없습니다.<br><br><a href="/" style="color:#000">← 홈으로</a></div>';
}

function goBack(){
  if(document.referrer&&document.referrer.includes(location.hostname)){
    history.back();
  } else {
    location.href='/';
  }
}

init();
</script>
</body>
</html>
